<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Crypto Terminal</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%232962ff'/%3E%3Cstop offset='100%25' stop-color='%2300e676'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect fill='url(%23g)' rx='20' width='100' height='100'/%3E%3Ctext x='50' y='68' font-family='Arial' font-weight='bold' font-size='60' fill='white' text-anchor='middle'%3EA%3C/text%3E%3C/svg%3E">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root {
            --bg-dark: #080c10;
            --bg-panel: #12161f;
            --bg-btn-hover: #1c2330;
            --border: #1f2937;
            --accent: #2962ff;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --up-color: #00e676;
            --down-color: #ff5252;
            --panel-height: 36px;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            overscroll-behavior: none;
        }

        header {
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            padding: 0 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: var(--panel-height);
            flex-shrink: 0;
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            font-weight: 800;
            font-size: 0.8rem;
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }
        .logo span { color: var(--accent); }

        .price-ticker {
            font-size: 0.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.03);
            padding: 3px 8px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .price-up { color: var(--up-color); }
        .price-down { color: var(--down-color); }

        .btn-icon {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-icon:hover { background: var(--bg-btn-hover); }
        .btn-icon:active { background: var(--bg-btn-hover); }
        .btn-icon svg { width: 16px; height: 16px; fill: currentColor; }
        .btn-icon.active { color: #ffd600; }

        .crypto-selector {
            display: flex;
            gap: 8px;
            padding: 0 12px;
            background: #0b0f17;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            height: 40px;
            align-items: center;
            flex-shrink: 0;
            scrollbar-width: none;
        }
        .crypto-selector::-webkit-scrollbar { display: none; }

        .coin-btn {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 5px 28px 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 700;
            white-space: nowrap;
            position: relative;
            display: inline-flex;
            align-items: center;
            transition: all 0.2s;
        }

        .coin-btn:hover { background: var(--bg-btn-hover); }

        .coin-btn.pinned { padding-right: 12px; }

        .coin-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .coin-btn .btn-del {
            position: absolute;
            right: 4px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--text-muted);
            transition: all 0.2s;
        }
        .coin-btn .btn-del:hover { background: rgba(255,255,255,0.1); }
        .coin-btn.active .btn-del { color: rgba(255,255,255,0.7); }

        .btn-add {
            background: transparent;
            border: 1px dashed var(--text-muted);
            padding: 5px 14px;
            color: var(--text-muted);
            font-weight: 600;
        }
        .btn-add:hover { border-color: var(--accent); color: var(--accent); }

        .interval-selector {
            display: flex;
            gap: 4px;
            padding: 8px 12px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            align-items: center;
            flex-shrink: 0;
            scrollbar-width: none;
        }
        .interval-selector::-webkit-scrollbar { display: none; }

        .interval-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .interval-btn:hover { background: var(--bg-btn-hover); }

        .interval-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        #charts-wrapper {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: var(--bg-dark);
            position: relative;
        }

        .chart-container {
            width: 100%;
            position: relative;
            background-color: var(--bg-dark);
            border-bottom: 1px solid var(--border);
        }

        #main-chart {
            flex-grow: 1;
            min-height: 300px;
        }

        .indicator-chart {
            height: 120px;
            flex-shrink: 0;
        }

        .chart-label {
            position: absolute;
            top: 8px;
            left: 12px;
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 600;
            z-index: 5;
            pointer-events: none;
            background: rgba(8, 12, 16, 0.8);
            padding: 4px 8px;
            border-radius: 4px;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(8, 12, 16, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .loading-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(41, 98, 255, 0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #toast-container {
            position: fixed;
            top: 50px;
            right: 12px;
            left: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10000;
            pointer-events: none;
        }

        .toast {
            background: rgba(18, 22, 31, 0.96);
            border: 1px solid var(--border);
            border-left: 4px solid var(--accent);
            color: #fff;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            animation: slideIn 0.25s ease forwards;
            pointer-events: auto;
        }

        .toast.alert-up { border-left-color: var(--up-color); }
        .toast.alert-down { border-left-color: var(--down-color); }

        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10001;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            width: 90%;
            max-width: 320px;
            transform: scale(0.9);
            transition: transform 0.2s ease;
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal h3 {
            margin: 0 0 16px 0;
            font-size: 1rem;
            font-weight: 700;
        }

        .modal input {
            width: 100%;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .modal input:focus {
            border-color: var(--accent);
        }

        .modal-buttons {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .modal-btn {
            background: var(--bg-btn-hover);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .modal-btn:hover {
            background: var(--border);
        }

        .modal-btn.primary {
            background: var(--accent);
            border-color: var(--accent);
        }

        .modal-btn.primary:hover {
            background: #1e4fd6;
        }

        @media (max-height: 700px) {
            .indicator-chart {
                height: 100px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <div class="logo">AMIGO<span>.ТЕРМИНАЛ</span></div>
            <div class="price-ticker" id="global-ticker">
                <span id="ticker-sym">BTC</span>&nbsp;<span id="ticker-price">...</span>
            </div>
        </div>
        <div>
            <button class="btn-icon" id="btn-alerts" onclick="toggleSmartAlerts()" title="Умные уведомления">
                <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2zm-2 1H8v-6c0-2.48 1.51-4.5 4-4.5s4 2.02 4 4.5v6z"/></svg>
            </button>
        </div>
    </header>

    <div class="crypto-selector" id="coin-list"></div>

    <div class="interval-selector">
        <button class="interval-btn" data-interval="1m">1m</button>
        <button class="interval-btn" data-interval="5m">5m</button>
        <button class="interval-btn active" data-interval="15m">15m</button>
        <button class="interval-btn" data-interval="1h">1h</button>
        <button class="interval-btn" data-interval="4h">4h</button>
        <button class="interval-btn" data-interval="1d">1d</button>
    </div>

    <div id="charts-wrapper">
        <div id="main-chart" class="chart-container"></div>
        <div id="macd-chart" class="chart-container indicator-chart" style="display:none;">
            <div class="chart-label">MACD (12, 26, 9)</div>
        </div>
        <div id="rsi-chart" class="chart-container indicator-chart" style="display:none;">
            <div class="chart-label">RSI (14)</div>
        </div>
        <div id="adx-chart" class="chart-container indicator-chart" style="display:none;">
            <div class="chart-label">ADX (14) / +DI / -DI</div>
        </div>
        <div class="loading-overlay" id="loading-overlay">
            <div class="spinner"></div>
        </div>
    </div>

    <div id="toast-container"></div>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h3>Добавить монету</h3>
            <input type="text" id="modal-input" placeholder="Например: XRP, ADA, PEPE" autocomplete="off">
            <div class="modal-buttons">
                <button class="modal-btn" onclick="closeModal()">Отмена</button>
                <button class="modal-btn primary" onclick="confirmAddCoin()">Добавить</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        console.log('🚀 Терминал v2.3 запускается...');

        const defaultCoins = ['BTCUSDT', 'ETHUSDT'];
        let userCoins = JSON.parse(localStorage.getItem('amigo_user_coins')) || ['SOLUSDT', 'TONUSDT', 'DOGEUSDT'];
        const MAX_TOTAL_COINS = 15; 
        
        let currentSymbol = 'BTCUSDT';
        let currentInterval = '15m';
        
        let mainChart = null;
        let candlestickSeries = null;
        let volumeSeries = null;
        let vwapSeries = null;
        
        let macdChart = null;
        let macdSeries = null;
        let macdSignalSeries = null;
        let macdHistogramSeries = null;
        
        let rsiChart = null;
        let rsiSeries = null;
        
        let adxChart = null;
        let adxSeries = null;
        let pdiSeries = null;
        let ndiSeries = null;
        
        let candleHistory = [];
        let klineWs = null;
        let tickerWs = null;
        let prices = {}; 
        let alertsEnabled = localStorage.getItem('amigo_alerts_enabled') === 'true';
        
        let timeScaleSubscriptions = [];
        let resizeObserver = null;
        let resizeDebounceTimer = null;
        
        const INDICATORS = {
            VWAP: true,
            MACD: true,
            RSI: true,
            ADX: true
        };

        const CANDLE_COLORS = {
            UP_COLOR: '#00e676',
            DOWN_COLOR: '#ff5252',
            UP_WICK: '#00e676',
            DOWN_WICK: '#ff5252'
        };

        const INDICATOR_COLORS = {
            VWAP: '#2962ff',
            MACD: '#2962ff',
            MACD_SIGNAL: '#ff9800',
            MACD_HIST_UP: '#00e676',
            MACD_HIST_DOWN: '#ff5252',
            RSI: '#9c27b0',
            ADX: '#ff9800',
            PDI: '#00e676',
            NDI: '#ff5252',
            VOLUME_UP: '#26a69a',
            VOLUME_DOWN: '#ef5350'
        };

        document.getElementById('btn-alerts').classList.toggle('active', alertsEnabled);

        document.querySelectorAll('.interval-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const interval = btn.dataset.interval;
                if (interval !== currentInterval) {
                    changeInterval(interval, btn);
                }
            });
        });

        function renderCoinList() {
            const container = document.getElementById('coin-list');
            if (!container) return;
            container.innerHTML = '';

            const allCoins = [...new Set([...defaultCoins, ...userCoins])].slice(0, MAX_TOTAL_COINS);

            allCoins.forEach(coin => {
                const isPinned = defaultCoins.includes(coin);
                const btn = document.createElement('button');
                btn.className = `coin-btn ${coin === currentSymbol ? 'active' : ''} ${isPinned ? 'pinned' : ''}`;
                
                const cleanName = coin.replace('USDT', '');
                btn.insertAdjacentText('beforeend', cleanName);

                if (!isPinned) {
                    const delBadge = document.createElement('span');
                    delBadge.className = 'btn-del';
                    delBadge.innerHTML = '×';
                    delBadge.onclick = (e) => {
                        e.stopPropagation();
                        removeCoin(coin);
                    };
                    btn.appendChild(delBadge);
                }

                btn.onclick = () => {
                    if (coin !== currentSymbol) {
                        changePair(coin, btn);
                    }
                };
                
                container.appendChild(btn);
            });

            const addBtn = document.createElement('button');
            addBtn.className = 'coin-btn btn-add';
            addBtn.innerText = '+';
            addBtn.onclick = openModal;
            container.appendChild(addBtn);
        }

        function destroyCharts() {
            timeScaleSubscriptions.forEach(sub => {
                if (sub.chart && sub.handler) {
                    sub.chart.timeScale().unsubscribeVisibleLogicalRangeChange(sub.handler);
                }
            });
            timeScaleSubscriptions = [];

            if (mainChart) {
                mainChart.remove();
                mainChart = null;
            }
            if (macdChart) {
                macdChart.remove();
                macdChart = null;
            }
            if (rsiChart) {
                rsiChart.remove();
                rsiChart = null;
            }
            if (adxChart) {
                adxChart.remove();
                adxChart = null;
            }

            candlestickSeries = null;
            volumeSeries = null;
            vwapSeries = null;
            macdSeries = null;
            macdSignalSeries = null;
            macdHistogramSeries = null;
            rsiSeries = null;
            adxSeries = null;
            pdiSeries = null;
            ndiSeries = null;
        }

        function initCharts() {
            console.log('📊 Инициализация графиков...');
            
            destroyCharts();
            
            const mainContainer = document.getElementById('main-chart');
            const macdContainer = document.getElementById('macd-chart');
            const rsiContainer = document.getElementById('rsi-chart');
            const adxContainer = document.getElementById('adx-chart');
            
            mainContainer.innerHTML = '';
            
            macdContainer.style.display = INDICATORS.MACD ? 'block' : 'none';
            rsiContainer.style.display = INDICATORS.RSI ? 'block' : 'none';
            adxContainer.style.display = INDICATORS.ADX ? 'block' : 'none';

            if (INDICATORS.MACD) macdContainer.innerHTML = '<div class="chart-label">MACD (12, 26, 9)</div>';
            if (INDICATORS.RSI) rsiContainer.innerHTML = '<div class="chart-label">RSI (14)</div>';
            if (INDICATORS.ADX) adxContainer.innerHTML = '<div class="chart-label">ADX (14) / +DI / -DI</div>';

            requestAnimationFrame(() => {
                const mainWidth = mainContainer.clientWidth;
                const mainHeight = mainContainer.clientHeight;
                
                if (mainWidth === 0 || mainHeight === 0) {
                    console.warn('⚠️ Размеры графика нулевые, повторная попытка...');
                    setTimeout(() => initCharts(), 100);
                    return;
                }

                mainChart = LightweightCharts.createChart(mainContainer, {
                    width: mainWidth,
                    height: mainHeight,
                    layout: {
                        textColor: '#d1d4dc',
                        background: { type: 'solid', color: '#080c10' },
                    },
                    grid: {
                        vertLines: { color: 'rgba(42, 46, 57, 0.4)' },
                        horzLines: { color: 'rgba(42, 46, 57, 0.4)' },
                    },
                    crosshair: { 
                        mode: LightweightCharts.CrosshairMode.Normal,
                        vertLine: {
                            width: 1,
                            color: 'rgba(255, 255, 255, 0.3)',
                            style: LightweightCharts.LineStyle.Dashed,
                        },
                        horzLine: {
                            width: 1,
                            color: 'rgba(255, 255, 255, 0.3)',
                            style: LightweightCharts.LineStyle.Dashed,
                        }
                    },
                    rightPriceScale: { borderColor: 'rgba(197, 203, 206, 0.4)' },
                    timeScale: {
                        borderColor: 'rgba(197, 203, 206, 0.4)',
                        timeVisible: true,
                        secondsVisible: false,
                        rightBarStaysOnScroll: true,
                    },
                    handleScroll: {
                        vertTouchDrag: false,
                        horzTouchDrag: true,
                        mouseWheel: true,
                    },
                    handleScale: {
                        axisPressedMouseMove: { time: true, price: true },
                        mouseWheel: true,
                        pinch: true,
                    },
                });

                candlestickSeries = mainChart.addCandlestickSeries({
                    upColor: CANDLE_COLORS.UP_COLOR,
                    downColor: CANDLE_COLORS.DOWN_COLOR,
                    borderVisible: false,
                    wickUpColor: CANDLE_COLORS.UP_WICK,
                    wickDownColor: CANDLE_COLORS.DOWN_WICK,
                });

                volumeSeries = mainChart.addHistogramSeries({
                    color: INDICATOR_COLORS.VOLUME_UP,
                    priceFormat: { type: 'volume' },
                    priceScaleId: 'volume',
                    scaleMargins: {
                        top: 0.8,
                        bottom: 0,
                    },
                });

                mainChart.priceScale('volume').applyOptions({
                    scaleMargins: {
                        top: 0.8,
                        bottom: 0,
                    },
                });

                if (INDICATORS.VWAP) {
                    vwapSeries = mainChart.addLineSeries({
                        color: INDICATOR_COLORS.VWAP,
                        lineWidth: 2,
                        title: 'VWAP',
                        lastValueVisible: true,
                        priceLineVisible: false,
                    });
                }

                const indicatorHeight = window.innerHeight <= 700 ? 100 : 120;

                if (INDICATORS.MACD) {
                    macdChart = LightweightCharts.createChart(macdContainer, {
                        width: macdContainer.clientWidth,
                        height: indicatorHeight,
                        layout: {
                            textColor: '#d1d4dc',
                            background: { type: 'solid', color: '#080c10' },
                        },
                        grid: {
                            vertLines: { color: 'rgba(42, 46, 57, 0.4)' },
                            horzLines: { color: 'rgba(42, 46, 57, 0.4)' },
                        },
                        crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                        rightPriceScale: { borderColor: 'rgba(197, 203, 206, 0.4)' },
                        timeScale: {
                            visible: false,
                            borderColor: 'rgba(197, 203, 206, 0.4)',
                        },
                        handleScroll: { mouseWheel: false },
                        handleScale: { mouseWheel: false },
                    });

                    macdHistogramSeries = macdChart.addHistogramSeries({
                        priceFormat: { type: 'price', precision: 2, minMove: 0.01 },
                    });

                    macdSeries = macdChart.addLineSeries({
                        color: INDICATOR_COLORS.MACD,
                        lineWidth: 2,
                        title: 'MACD',
                        lastValueVisible: true,
                        priceLineVisible: false,
                    });

                    macdSignalSeries = macdChart.addLineSeries({
                        color: INDICATOR_COLORS.MACD_SIGNAL,
                        lineWidth: 2,
                        title: 'Signal',
                        lastValueVisible: true,
                        priceLineVisible: false,
                    });
                }

                if (INDICATORS.RSI) {
                    rsiChart = LightweightCharts.createChart(rsiContainer, {
                        width: rsiContainer.clientWidth,
                        height: indicatorHeight,
                        layout: {
                            textColor: '#d1d4dc',
                            background: { type: 'solid', color: '#080c10' },
                        },
                        grid: {
                            vertLines: { color: 'rgba(42, 46, 57, 0.4)' },
                            horzLines: { color: 'rgba(42, 46, 57, 0.4)' },
                        },
                        crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                        rightPriceScale: { borderColor: 'rgba(197, 203, 206, 0.4)' },
                        timeScale: {
                            visible: false,
                            borderColor: 'rgba(197, 203, 206, 0.4)',
                        },
                        handleScroll: { mouseWheel: false },
                        handleScale: { mouseWheel: false },
                    });

                    rsiSeries = rsiChart.addLineSeries({
                        color: INDICATOR_COLORS.RSI,
                        lineWidth: 2,
                        title: 'RSI',
                        lastValueVisible: true,
                        priceLineVisible: false,
                    });
                }

                if (INDICATORS.ADX) {
                    adxChart = LightweightCharts.createChart(adxContainer, {
                        width: adxContainer.clientWidth,
                        height: indicatorHeight,
                        layout: {
                            textColor: '#d1d4dc',
                            background: { type: 'solid', color: '#080c10' },
                        },
                        grid: {
                            vertLines: { color: 'rgba(42, 46, 57, 0.4)' },
                            horzLines: { color: 'rgba(42, 46, 57, 0.4)' },
                        },
                        crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                        rightPriceScale: { borderColor: 'rgba(197, 203, 206, 0.4)' },
                        timeScale: {
                            visible: false,
                            borderColor: 'rgba(197, 203, 206, 0.4)',
                        },
                        handleScroll: { mouseWheel: false },
                        handleScale: { mouseWheel: false },
                    });

                    adxSeries = adxChart.addLineSeries({
                        color: INDICATOR_COLORS.ADX,
                        lineWidth: 2,
                        title: 'ADX',
                        lastValueVisible: true,
                        priceLineVisible: false,
                    });

                    pdiSeries = adxChart.addLineSeries({
                        color: INDICATOR_COLORS.PDI,
                        lineWidth: 1,
                        title: '+DI',
                        lastValueVisible: true,
                        priceLineVisible: false,
                    });

                    ndiSeries = adxChart.addLineSeries({
                        color: INDICATOR_COLORS.NDI,
                        lineWidth: 1,
                        title: '-DI',
                        lastValueVisible: true,
                        priceLineVisible: false,
                    });
                }

                syncTimeScales();
                setupResizeObserver();

                console.log('✅ Графики созданы');
            });
        }

        function setupResizeObserver() {
            if (resizeObserver) {
                resizeObserver.disconnect();
            }

            resizeObserver = new ResizeObserver(entries => {
                clearTimeout(resizeDebounceTimer);
                resizeDebounceTimer = setTimeout(() => {
                    entries.forEach(entry => {
                        const { width, height } = entry.contentRect;
                        if (width > 0 && height > 0) {
                            if (entry.target.id === 'main-chart' && mainChart) {
                                mainChart.resize(width, height);
                            } else if (entry.target.id === 'macd-chart' && macdChart) {
                                const indicatorHeight = window.innerHeight <= 700 ? 100 : 120;
                                macdChart.resize(width, indicatorHeight);
                            } else if (entry.target.id === 'rsi-chart' && rsiChart) {
                                const indicatorHeight = window.innerHeight <= 700 ? 100 : 120;
                                rsiChart.resize(width, indicatorHeight);
                            } else if (entry.target.id === 'adx-chart' && adxChart) {
                                const indicatorHeight = window.innerHeight <= 700 ? 100 : 120;
                                adxChart.resize(width, indicatorHeight);
                            }
                        }
                    });
                }, 100);
            });
            
            const mainContainer = document.getElementById('main-chart');
            const macdContainer = document.getElementById('macd-chart');
            const rsiContainer = document.getElementById('rsi-chart');
            const adxContainer = document.getElementById('adx-chart');

            resizeObserver.observe(mainContainer);
            if (INDICATORS.MACD) resizeObserver.observe(macdContainer);
            if (INDICATORS.RSI) resizeObserver.observe(rsiContainer);
            if (INDICATORS.ADX) resizeObserver.observe(adxContainer);
        }

        function syncTimeScales() {
            const charts = [mainChart, macdChart, rsiChart, adxChart].filter(c => c);
            
            if (mainChart) {
                const handler = (range) => {
                    if (range) {
                        charts.forEach(targetChart => {
                            if (targetChart !== mainChart) {
                                targetChart.timeScale().setVisibleLogicalRange(range);
                            }
                        });
                    }
                };
                
                mainChart.timeScale().subscribeVisibleLogicalRangeChange(handler);
                timeScaleSubscriptions.push({ chart: mainChart, handler });
            }
        }

        function calculateVWAP(data) {
            let cumulativeTPV = 0;
            let cumulativeVolume = 0;
            const vwapData = [];
            let currentDay = null;
            
            for (let i = 0; i < data.length; i++) {
                const candle = data[i];
                const candleDate = new Date(candle.time * 1000).getUTCDate();
                
                if (currentDay !== null && currentDay !== candleDate) {
                    cumulativeTPV = 0;
                    cumulativeVolume = 0;
                }
                currentDay = candleDate;
                
                const typicalPrice = (candle.high + candle.low + candle.close) / 3;
                cumulativeTPV += typicalPrice * candle.volume;
                cumulativeVolume += candle.volume;
                
                vwapData.push({
                    time: candle.time,
                    value: cumulativeVolume > 0 ? cumulativeTPV / cumulativeVolume : candle.close
                });
            }
            
            return vwapData;
        }

        function calculateEMA(values, period) {
            const k = 2 / (period + 1);
            const ema = [];
            
            let sum = 0;
            for (let i = 0; i < Math.min(period, values.length); i++) {
                sum += values[i].value;
            }
            
            let prevEma = values.length >= period ? sum / period : values[0].value;
            
            for (let i = 0; i < values.length; i++) {
                const emaValue = i < period ? prevEma : values[i].value * k + prevEma * (1 - k);
                ema.push({ time: values[i].time, value: emaValue });
                prevEma = emaValue;
            }
            
            return ema;
        }

        function calculateMACD(data, fast=12, slow=26, signal=9) {
            const closes = data.map(d => ({ time: d.time, value: d.close }));
            const emaFast = calculateEMA(closes, fast);
            const emaSlow = calculateEMA(closes, slow);
            
            const macdLine = [];
            for (let i = 0; i < data.length; i++) {
                macdLine.push({
                    time: data[i].time,
                    value: emaFast[i].value - emaSlow[i].value
                });
            }
            
            const signalLine = calculateEMA(macdLine, signal);
            
            const histogram = [];
            for (let i = 0; i < data.length; i++) {
                histogram.push({
                    time: data[i].time,
                    value: macdLine[i].value - signalLine[i].value,
                    color: macdLine[i].value >= signalLine[i].value ? INDICATOR_COLORS.MACD_HIST_UP : INDICATOR_COLORS.MACD_HIST_DOWN
                });
            }
            
            return { macdLine, signalLine, histogram };
        }

        function calculateRSI(data, period=14) {
            const rsi = [];
            let gains = 0;
            let losses = 0;
            
            for (let i = 1; i <= period; i++) {
                const change = data[i].close - data[i-1].close;
                if (change > 0) gains += change;
                else losses += Math.abs(change);
            }
            
            let avgGain = gains / period;
            let avgLoss = losses / period;
            
            const rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
            const rsiValue = 100 - (100 / (1 + rs));
            rsi.push({ time: data[period].time, value: rsiValue });
            
            for (let i = period + 1; i < data.length; i++) {
                const change = data[i].close - data[i-1].close;
                const gain = change > 0 ? change : 0;
                const loss = change < 0 ? Math.abs(change) : 0;
                
                avgGain = (avgGain * (period - 1) + gain) / period;
                avgLoss = (avgLoss * (period - 1) + loss) / period;
                
                const rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
                const rsiValue = 100 - (100 / (1 + rs));
                
                rsi.push({ time: data[i].time, value: rsiValue });
            }
            
            return rsi;
        }

        function calculateADX(data, period=14) {
            const adx = [];
            const pdi = [];
            const ndi = [];
            
            let trSum = 0;
            let plusDMSum = 0;
            let minusDMSum = 0;
            
            for (let i = 1; i <= period; i++) {
                const high = data[i].high;
                const low = data[i].low;
                const prevClose = data[i-1].close;
                
                const tr = Math.max(high - low, Math.abs(high - prevClose), Math.abs(low - prevClose));
                trSum += tr;
                
                const upMove = high - data[i-1].high;
                const downMove = data[i-1].low - low;
                
                if (upMove > downMove && upMove > 0) plusDMSum += upMove;
                if (downMove > upMove && downMove > 0) minusDMSum += downMove;
            }
            
            let avgTR = trSum / period;
            let avgPlusDM = plusDMSum / period;
            let avgMinusDM = minusDMSum / period;
            
            let plusDI = (avgPlusDM / avgTR) * 100;
            let minusDI = (avgMinusDM / avgTR) * 100;
            let dx = Math.abs(plusDI - minusDI) / (plusDI + minusDI) * 100;
            let adxValue = dx;
            
            adx.push({ time: data[period].time, value: adxValue });
            pdi.push({ time: data[period].time, value: plusDI });
            ndi.push({ time: data[period].time, value: minusDI });
            
            for (let i = period + 1; i < data.length; i++) {
                const high = data[i].high;
                const low = data[i].low;
                const prevClose = data[i-1].close;
                
                const tr = Math.max(high - low, Math.abs(high - prevClose), Math.abs(low - prevClose));
                avgTR = (avgTR * (period - 1) + tr) / period;
                
                const upMove = high - data[i-1].high;
                const downMove = data[i-1].low - low;
                
                let plusDM = 0;
                let minusDM = 0;
                
                if (upMove > downMove && upMove > 0) plusDM = upMove;
                if (downMove > upMove && downMove > 0) minusDM = downMove;
                
                avgPlusDM = (avgPlusDM * (period - 1) + plusDM) / period;
                avgMinusDM = (avgMinusDM * (period - 1) + minusDM) / period;
                
                plusDI = (avgPlusDM / avgTR) * 100;
                minusDI = (avgMinusDM / avgTR) * 100;
                
                dx = Math.abs(plusDI - minusDI) / (plusDI + minusDI) * 100;
                adxValue = (adxValue * (period - 1) + dx) / period;
                
                adx.push({ time: data[i].time, value: adxValue });
                pdi.push({ time: data[i].time, value: plusDI });
                ndi.push({ time: data[i].time, value: minusDI });
            }
            
            return { adx, pdi, ndi };
        }

        function showLoading(show) {
            const overlay = document.getElementById('loading-overlay');
            if (overlay) {
                overlay.classList.toggle('active', show);
            }
        }

        async function loadChartHistory(symbol) {
            console.log(`📥 Загрузка истории для ${symbol} (${currentInterval})...`);
            showLoading(true);
            
            try {
                const url = `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${currentInterval}&limit=300`;
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                
                console.log(`✅ Получено свечей: ${data.length}`);

                candleHistory = data.map(k => ({
                    time: Math.floor(k[0] / 1000),
                    open: parseFloat(k[1]),
                    high: parseFloat(k[2]),
                    low: parseFloat(k[3]),
                    close: parseFloat(k[4]),
                    volume: parseFloat(k[5])
                }));

                if (!candlestickSeries) {
                    console.warn('⚠️ Графики ещё не инициализированы');
                    showLoading(false);
                    return false;
                }

                candlestickSeries.setData(candleHistory);

                const volumeData = candleHistory.map(c => ({
                    time: c.time,
                    value: c.volume,
                    color: c.close >= c.open ? INDICATOR_COLORS.VOLUME_UP : INDICATOR_COLORS.VOLUME_DOWN
                }));
                volumeSeries.setData(volumeData);

                if (INDICATORS.VWAP && vwapSeries) {
                    vwapSeries.setData(calculateVWAP(candleHistory));
                }

                if (INDICATORS.MACD && macdSeries && macdSignalSeries && macdHistogramSeries) {
                    const macd = calculateMACD(candleHistory);
                    macdSeries.setData(macd.macdLine);
                    macdSignalSeries.setData(macd.signalLine);
                    macdHistogramSeries.setData(macd.histogram);
                }

                if (INDICATORS.RSI && rsiSeries) {
                    rsiSeries.setData(calculateRSI(candleHistory));
                }

                if (INDICATORS.ADX && adxSeries && pdiSeries && ndiSeries) {
                    const adx = calculateADX(candleHistory);
                    adxSeries.setData(adx.adx);
                    pdiSeries.setData(adx.pdi);
                    ndiSeries.setData(adx.ndi);
                }

                mainChart.timeScale().fitContent();
                console.log(`✅ Все индикаторы отрисованы`);
                showLoading(false);
                return true;
            } catch (err) {
                console.error('❌ Ошибка загрузки истории:', err);
                showToast('Ошибка', 'Не удалось загрузить историю', 'alert-down');
                showLoading(false);
                return false;
            }
        }

        function updateIndicatorsRealtime() {
            if (candleHistory.length < 30) return;

            if (INDICATORS.VWAP && vwapSeries) {
                vwapSeries.setData(calculateVWAP(candleHistory));
            }

            if (INDICATORS.MACD && macdSeries && macdSignalSeries && macdHistogramSeries) {
                const macd = calculateMACD(candleHistory);
                macdSeries.setData(macd.macdLine);
                macdSignalSeries.setData(macd.signalLine);
                macdHistogramSeries.setData(macd.histogram);
            }

            if (INDICATORS.RSI && rsiSeries) {
                rsiSeries.setData(calculateRSI(candleHistory));
            }

            if (INDICATORS.ADX && adxSeries && pdiSeries && ndiSeries) {
                const adx = calculateADX(candleHistory);
                adxSeries.setData(adx.adx);
                pdiSeries.setData(adx.pdi);
                ndiSeries.setData(adx.ndi);
            }
        }

        function initKlineWebSocket(symbol) {
            if (klineWs) {
                klineWs.onclose = null;
                klineWs.close();
            }

            const socketUrl = `wss://stream.binance.com:9443/ws/${symbol.toLowerCase()}@kline_${currentInterval}`;
            console.log(`🔌 Kline WS: ${socketUrl}`);
            
            klineWs = new WebSocket(socketUrl);

            klineWs.onopen = () => console.log('✅ Kline WS подключен');

            klineWs.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    const k = msg.k;
                    if (!k) return;

                    const candle = {
                        time: Math.floor(k.t / 1000),
                        open: parseFloat(k.o),
                        high: parseFloat(k.h),
                        low: parseFloat(k.l),
                        close: parseFloat(k.c),
                        volume: parseFloat(k.v)
                    };

                    if (!candlestickSeries) return;

                    candlestickSeries.update(candle);
                    
                    volumeSeries.update({
                        time: candle.time,
                        value: candle.volume,
                        color: candle.close >= candle.open ? INDICATOR_COLORS.VOLUME_UP : INDICATOR_COLORS.VOLUME_DOWN
                    });

                    const lastHist = candleHistory[candleHistory.length - 1];
                    let isNewCandle = false;
                    if (!lastHist || lastHist.time !== candle.time) {
                        candleHistory.push(candle);
                        if (candleHistory.length > 500) candleHistory.shift();
                        isNewCandle = true;
                    } else {
                        candleHistory[candleHistory.length - 1] = candle;
                    }

                    if (isNewCandle) {
                        updateIndicatorsRealtime();
                    }
                } catch (e) {
                    console.error('Ошибка парсинга kline:', e);
                }
            };

            klineWs.onclose = () => {
                setTimeout(() => {
                    if (currentSymbol === symbol) {
                        initKlineWebSocket(symbol);
                    }
                }, 3000);
            };

            klineWs.onerror = (err) => console.error('❌ Kline WS error', err);
        }

        function initTickerWebSocket(coins) {
            if (tickerWs && tickerWs.readyState === WebSocket.OPEN) {
                return;
            }
            
            if (tickerWs) {
                tickerWs.onclose = null;
                tickerWs.close();
            }
            
            const streams = coins.map(c => `${c.toLowerCase()}@ticker`).join('/');
            const socketUrl = `wss://stream.binance.com:9443/stream?streams=${streams}`;
            console.log(`🔌 Ticker WS: ${socketUrl}`);
            
            tickerWs = new WebSocket(socketUrl);

            tickerWs.onopen = () => console.log('✅ Ticker WS подключен');

            tickerWs.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    const data = msg.data || msg;
                    if (!data || !data.s) return;

                    const symbol = data.s;
                    const rawPrice = parseFloat(data.c);
                    const price = rawPrice.toFixed(rawPrice < 1 ? 4 : (rawPrice < 20 ? 3 : 2));
                    const priceChangePercent = parseFloat(data.P); 

                    prices[symbol] = price;

                    if (symbol === currentSymbol) {
                        const priceEl = document.getElementById('ticker-price');
                        if (priceEl) {
                            priceEl.innerText = price;
                            priceEl.className = priceChangePercent >= 0 ? 'price-up' : 'price-down';
                        }
                    }

                    if (alertsEnabled) {
                        checkAndFireAlert(symbol, price, priceChangePercent);
                    }
                } catch (e) {
                    console.error("WS parsing error:", e);
                }
            };

            tickerWs.onclose = () => {
                setTimeout(() => {
                    const activeCoins = [...new Set([...defaultCoins, ...userCoins])].slice(0, MAX_TOTAL_COINS);
                    initTickerWebSocket(activeCoins);
                }, 5000);
            };

            tickerWs.onerror = (err) => console.error("Ticker WS error", err);
        }

        async function changePair(symbol, btnElement) {
            console.log(`\n🔄 Смена пары на ${symbol}`);
            
            currentSymbol = symbol;
            
            document.querySelectorAll('.coin-btn').forEach(b => b.classList.remove('active'));
            if (btnElement) {
                btnElement.classList.add('active');
            } else {
                renderCoinList();
            }

            const displaySym = symbol.replace('USDT', '');
            document.getElementById('ticker-sym').innerText = displaySym;
            
            const cachedPrice = prices[symbol];
            const priceEl = document.getElementById('ticker-price');
            priceEl.innerText = cachedPrice ? cachedPrice : '...';
            priceEl.className = ''; 

            initCharts();
            await loadChartHistory(symbol);
            initKlineWebSocket(symbol);
            
            const allCoins = [...new Set([...defaultCoins, ...userCoins])].slice(0, MAX_TOTAL_COINS);
            initTickerWebSocket(allCoins);
        }

        async function changeInterval(interval, btnElement) {
            console.log(`\n⏱ Смена интервала на ${interval}`);
            
            currentInterval = interval;
            
            document.querySelectorAll('.interval-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');

            initCharts();
            await loadChartHistory(currentSymbol);
            initKlineWebSocket(currentSymbol);
        }

        function openModal() {
            const modal = document.getElementById('modal-overlay');
            const input = document.getElementById('modal-input');
            modal.classList.add('active');
            input.value = '';
            setTimeout(() => input.focus(), 200);
        }

        function closeModal() {
            const modal = document.getElementById('modal-overlay');
            modal.classList.remove('active');
        }

        function confirmAddCoin() {
            const input = document.getElementById('modal-input');
            let newCoin = input.value.toUpperCase().replace(/[^A-Z0-9]/g, '').trim();
            
            if (!newCoin) {
                showToast("Ошибка", "Введите тикер монеты", "alert-down");
                return;
            }
            
            if (!newCoin.endsWith('USDT') && !newCoin.endsWith('BUSD')) {
                newCoin += 'USDT';
            }

            const allCoins = [...new Set([...defaultCoins, ...userCoins])];
            if (allCoins.length >= MAX_TOTAL_COINS) {
                showToast("Лимит", `Максимум ${MAX_TOTAL_COINS} монет.`, 'alert-down');
                closeModal();
                return;
            }

            if (!allCoins.includes(newCoin)) {
                userCoins.push(newCoin);
                localStorage.setItem('amigo_user_coins', JSON.stringify(userCoins));
                renderCoinList();
                showToast("Успешно", `${newCoin.replace('USDT','')} добавлен`, 'info');
                
                const allCoinsUpdated = [...new Set([...defaultCoins, ...userCoins])].slice(0, MAX_TOTAL_COINS);
                initTickerWebSocket(allCoinsUpdated);
            } else {
                showToast("Инфо", "Монета уже добавлена", "info");
            }
            
            closeModal();
        }

        document.getElementById('modal-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                confirmAddCoin();
            }
        });

        function removeCoin(coin) {
            userCoins = userCoins.filter(c => c !== coin);
            localStorage.setItem('amigo_user_coins', JSON.stringify(userCoins));
            
            const alertKey = `alerted_${coin}`;
            sessionStorage.removeItem(alertKey);

            if (currentSymbol === coin) {
                changePair(defaultCoins[0]);
            } else {
                renderCoinList();
            }
            showToast("Удалено", `${coin.replace('USDT','')} извлечен`, 'info');
            
            const allCoins = [...new Set([...defaultCoins, ...userCoins])].slice(0, MAX_TOTAL_COINS);
            initTickerWebSocket(allCoins);
        }

        function toggleSmartAlerts() {
            alertsEnabled = !alertsEnabled;
            localStorage.setItem('amigo_alerts_enabled', alertsEnabled ? 'true' : 'false');
            
            const btn = document.getElementById('btn-alerts');
            btn.classList.toggle('active', alertsEnabled);
            
            if (alertsEnabled) {
                showToast("Smart Alerts", "Мониторинг ≥2% запущен", "info");
            } else {
                showToast("Smart Alerts", "Мониторинг деактивирован", "info");
            }
        }

        function checkAndFireAlert(symbol, price, changePct) {
            if (Math.abs(changePct) < 2.0) return;

            const alertKey = `alerted_${symbol}`;
            const lastAlertTime = sessionStorage.getItem(alertKey);
            const now = Date.now();

            if (!lastAlertTime || (now - parseInt(lastAlertTime) > 15 * 60 * 1000)) {
                const dir = changePct > 0 ? "🚀 ПАМП" : "🩸 ДАМП";
                const type = changePct > 0 ? "alert-up" : "alert-down";
                
                showToast(`${dir}: ${symbol.replace('USDT','')}`, `${price} (${changePct > 0 ? '+' : ''}${changePct.toFixed(2)}%)`, type);
                
                sessionStorage.setItem(alertKey, now.toString());
            }
        }

        function showToast(title, message, type = '') {
            const container = document.getElementById('toast-container');
            if (!container) return;

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<div><strong>${title}</strong></div><div>${message}</div>`;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.25s ease-out forwards';
                setTimeout(() => toast.remove(), 250);
            }, 3500);
        }

        renderCoinList();
        changePair(currentSymbol);
    </script>
