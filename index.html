<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AMIGO Terminal</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%232962ff'/%3E%3Cstop offset='100%25' stop-color='%23089981'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect fill='url(%23g)' rx='20' width='100' height='100'/%3E%3Ctext x='50' y='68' font-family='Arial' font-weight='bold' font-size='60' fill='white' text-anchor='middle'%3EA%3C/text%3E%3C/svg%3E">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        /* ============================================
           CSS ТОКЕНЫ — TradingView-палитра (из B) +
           safe-area поддержка (из A)
        ============================================ */
        :root {
            --bg-dark:       #131722;
            --bg-panel:      #1e222d;
            --bg-btn-hover:  #2a2e39;
            --border:        #2a2e39;
            --accent:        #2962ff;
            --text-main:     #d1d4dc;
            --text-muted:    #787b86;
            --up-color:      #089981;
            --down-color:    #f23645;
            --panel-height:  44px;
            --safe-top:      env(safe-area-inset-top, 0px);
            --safe-bottom:   env(safe-area-inset-bottom, 0px);
        }

        /* ============================================
           RESET — из B: глобальный, включая margin/padding
        ============================================ */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Глобальный scrollbar — из B (4px, чище) */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            overscroll-behavior: none;
        }

        /* ============================================
           HEADER — из A (safe-area) + из B (размеры, box-model)
        ============================================ */
        header {
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            padding: 0 16px;
            padding-top: var(--safe-top);
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: var(--panel-height);
            box-sizing: content-box;
            flex-shrink: 0;
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo {
            font-weight: 800;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            white-space: nowrap;
            color: var(--text-main);
        }
        .logo span { color: var(--accent); }

        .price-ticker {
            font-size: 0.85rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.04);
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            min-width: 140px;
            justify-content: center;
        }
        .price-up   { color: var(--up-color); }
        .price-down { color: var(--down-color); }

        /* Кнопки-иконки (alerts) — из A */
        .btn-icon {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: background 0.15s ease, color 0.15s ease;
            flex-shrink: 0;
        }
        .btn-icon:active { background: var(--bg-btn-hover); }
        .btn-icon svg    { width: 18px; height: 18px; fill: currentColor; }
        .btn-icon.active { color: #ffd600; }

        /* ============================================
           ПАНЕЛЬ УПРАВЛЕНИЯ — из B (flex-column) +
           из A (разделитель между coin и interval)
        ============================================ */
        .controls-row {
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            background: var(--bg-dark);
            border-bottom: 1px solid var(--border);
        }

        /* Горизонтальная прокрутка — из B */
        .hscroll {
            display: flex;
            gap: 6px;
            padding: 7px 16px;
            overflow-x: auto;
            align-items: center;
            scrollbar-width: none;
        }
        .hscroll::-webkit-scrollbar { display: none; }

        /* Разделитель между строками */
        .hscroll + .hscroll {
            border-top: 1px solid var(--border);
            padding-top: 6px;
            padding-bottom: 6px;
        }

        /* ============================================
           КНОПКИ — унифицированные из A+B
        ============================================ */
        .coin-btn,
        .interval-btn,
        .indicator-toggle {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: inherit;
        }
        .coin-btn      { padding: 5px 14px; font-size: 0.75rem; position: relative; }
        .interval-btn  { padding: 4px 10px; font-size: 0.72rem; }
        .indicator-toggle { padding: 4px 10px; font-size: 0.72rem; }

        .coin-btn.active,
        .interval-btn.active,
        .indicator-toggle.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        /* Кнопка монеты с иксом — из A */
        .coin-btn:not(.pinned) { padding-right: 28px; }
        .btn-del {
            position: absolute;
            right: 4px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1;
        }
        .coin-btn.active .btn-del { color: rgba(255,255,255,0.7); }

        /* Кнопка добавить монету */
        .btn-add {
            background: transparent !important;
            border-style: dashed !important;
            color: var(--text-muted) !important;
            padding: 5px 14px !important;
        }

        /* ============================================
           CHARTS WRAPPER — из B (position:relative) +
           из A (scrollbar-thin)
        ============================================ */
        #charts-wrapper {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            background-color: var(--bg-dark);
            position: relative;
            padding-bottom: var(--safe-bottom);
        }

        .chart-container {
            width: 100%;
            position: relative;
            background-color: var(--bg-dark);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        #main-chart      { flex-grow: 1; min-height: 320px; }
        .indicator-chart { height: 160px; }

        /* ============================================
           ЛЕГЕНДА — из B (chart-legend, chart-title, chart-values)
        ============================================ */
        .chart-legend {
            position: absolute;
            top: 8px;
            left: 12px;
            z-index: 5;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 3px;
            background: rgba(19, 23, 34, 0.75);
            padding: 4px 8px;
            border-radius: 4px;
            backdrop-filter: blur(4px);
        }
        .chart-title {
            font-size: 0.78rem;
            color: var(--text-main);
            font-weight: 700;
        }
        .chart-values {
            font-size: 0.72rem;
            display: flex;
            gap: 10px;
            font-variant-numeric: tabular-nums;
            color: var(--text-muted);
        }
        .chart-values span { color: var(--text-main); }

        /* ============================================
           LOADING OVERLAY — из B (спиннер)
        ============================================ */
        #loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(19, 23, 34, 0.92);
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            font-size: 0.85rem;
            font-weight: 600;
            gap: 12px;
            transition: opacity 0.25s ease;
        }
        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .spinner {
            width: 22px;
            height: 22px;
            border: 2px solid rgba(41, 98, 255, 0.25);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.9s ease-in-out infinite;
            flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ============================================
           ТОСТЫ — из A (slideIn/fadeOut + типы)
        ============================================ */
        #toast-container {
            position: fixed;
            top: calc(var(--panel-height) + var(--safe-top) + 8px);
            right: 12px;
            left: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10000;
            pointer-events: none;
        }
        .toast {
            background: rgba(30, 34, 45, 0.97);
            border: 1px solid var(--border);
            border-left: 4px solid var(--accent);
            color: var(--text-main);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            animation: toastIn 0.2s ease forwards;
            pointer-events: auto;
        }
        .toast strong { display: block; margin-bottom: 2px; font-size: 0.82rem; }
        .toast.alert-up   { border-left-color: var(--up-color); }
        .toast.alert-down { border-left-color: var(--down-color); }
        .toast.info       { border-left-color: var(--accent); }

        @keyframes toastIn {
            from { transform: translateY(-12px); opacity: 0; }
            to   { transform: translateY(0);     opacity: 1; }
        }
        @keyframes toastOut {
            from { opacity: 1; }
            to   { opacity: 0; }
        }

        /* ============================================
           АДАПТИВ — mobile first tweaks
        ============================================ */
        @media (max-width: 480px) {
            .price-ticker { min-width: unset; font-size: 0.8rem; }
            #main-chart   { min-height: 260px; }
            .indicator-chart { height: 130px; }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header>
    <div class="header-left">
        <div class="logo">AMIGO<span>.TERMINAL</span></div>
        <div class="price-ticker" id="global-ticker">
            <span id="ticker-sym">BTC</span>
            <span id="ticker-price">...</span>
        </div>
    </div>
    <div style="display:flex;align-items:center;gap:4px;">
        <button class="btn-icon" id="btn-alerts" title="Smart Alerts ≥2%">
            <svg viewBox="0 0 24 24">
                <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2zm-2 1H8v-6c0-2.48 1.51-4.5 4-4.5s4 2.02 4 4.5v6z"/>
            </svg>
        </button>
    </div>
</header>

<!-- CONTROLS: монеты / интервалы / индикаторы -->
<div class="controls-row">
    <!-- Строка монет -->
    <div class="hscroll" id="coin-list"></div>
    <!-- Строка интервалов + индикаторы -->
    <div class="hscroll" id="bottom-controls">
        <div style="display:flex;gap:4px;flex-shrink:0;" id="interval-selector">
            <button class="interval-btn" data-interval="1m">1m</button>
            <button class="interval-btn" data-interval="5m">5m</button>
            <button class="interval-btn active" data-interval="15m">15m</button>
            <button class="interval-btn" data-interval="30m">30m</button>
            <button class="interval-btn" data-interval="1h">1h</button>
            <button class="interval-btn" data-interval="4h">4h</button>
            <button class="interval-btn" data-interval="1d">1d</button>
            <button class="interval-btn" data-interval="1w">1w</button>
            <button class="interval-btn" data-interval="1M">1M</button>
        </div>
        <div style="width:1px;background:var(--border);margin:0 4px;flex-shrink:0;height:20px;align-self:center;"></div>
        <div style="display:flex;gap:4px;flex-shrink:0;" id="indicator-selector">
            <button class="indicator-toggle active" data-ind="VWAP">VWAP</button>
            <button class="indicator-toggle active" data-ind="MACD">MACD</button>
            <button class="indicator-toggle active" data-ind="RSI">RSI</button>
            <button class="indicator-toggle active" data-ind="ADX">ADX</button>
        </div>
    </div>
</div>

<!-- CHARTS -->
<div id="charts-wrapper">
    <!-- Loading overlay (из B) -->
    <div id="loading-overlay" class="hidden">
        <div class="spinner"></div>
        Загрузка данных...
    </div>

    <!-- Основной график -->
    <div id="main-chart" class="chart-container">
        <div class="chart-legend">
            <div class="chart-title" id="legend-title">BTCUSDT • 15m</div>
            <div class="chart-values" id="legend-values">
                <div>O&nbsp;<span id="info-open">—</span></div>
                <div>H&nbsp;<span id="info-high">—</span></div>
                <div>L&nbsp;<span id="info-low">—</span></div>
                <div>C&nbsp;<span id="info-close">—</span></div>
                <div>V&nbsp;<span id="info-vol">—</span></div>
            </div>
        </div>
    </div>

    <!-- MACD -->
    <div id="macd-chart" class="chart-container indicator-chart">
        <div class="chart-legend">
            <div class="chart-title">MACD (12, 26, 9)</div>
        </div>
    </div>

    <!-- RSI -->
    <div id="rsi-chart" class="chart-container indicator-chart">
        <div class="chart-legend">
            <div class="chart-title">RSI (14)</div>
        </div>
    </div>

    <!-- ADX -->
    <div id="adx-chart" class="chart-container indicator-chart">
        <div class="chart-legend">
            <div class="chart-title">ADX (14)</div>
        </div>
    </div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<script>
(function () {
    'use strict';

    // ============================================================
    // TELEGRAM MINI APP INIT (из B — setHeaderColor/setBackgroundColor)
    // ============================================================
    const tg = window.Telegram?.WebApp;
    if (tg) {
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#1e222d');
        tg.setBackgroundColor('#131722');
    }

    // ============================================================
    // КОНФИГУРАЦИЯ
    // ============================================================
    const MAX_CANDLES       = 1000;
    const MAX_TOTAL_COINS   = 15;
    const STORAGE_COINS     = 'amigo_user_coins';
    const STORAGE_ALERTS    = 'amigo_alerts_enabled';
    const STORAGE_INDS      = 'amigo_indicator_visibility';

    // ============================================================
    // СОСТОЯНИЕ ПРИЛОЖЕНИЯ
    // ============================================================
    const defaultCoins = ['BTCUSDT', 'ETHUSDT'];
    let userCoins = JSON.parse(localStorage.getItem(STORAGE_COINS)) || ['SOLUSDT', 'TONUSDT', 'DOGEUSDT'];

    let currentSymbol   = 'BTCUSDT';
    let currentInterval = '15m';
    let alertsEnabled   = localStorage.getItem(STORAGE_ALERTS) === 'true';

    // Видимость индикаторов — из A (persist localStorage)
    let indicatorVis = { VWAP: true, MACD: true, RSI: true, ADX: true };
    try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_INDS));
        if (saved) indicatorVis = { ...indicatorVis, ...saved };
    } catch (_) {}

    // Хранилище цен
    const prices = {};

    // ============================================================
    // ЦВЕТА — TradingView-палитра из B
    // ============================================================
    const C = {
        up:       '#089981',
        down:     '#f23645',
        bg:       '#131722',
        grid:     'rgba(42,46,57,0.5)',
        text:     '#787b86',
        vwap:     '#fcc201',
        macd:     '#2962ff',
        signal:   '#ff6d00',
        histUp:   'rgba(8,153,129,0.85)',
        histDown: 'rgba(242,54,69,0.85)',
        rsi:      '#9c27b0',
        adx:      '#2962ff',
        pdi:      '#089981',
        ndi:      '#f23645',
    };

    // ============================================================
    // ГРАФИКИ — структура из B (charts + series объекты)
    // ============================================================
    const charts = { main: null, macd: null, rsi: null, adx: null };
    const series = {};
    let candleHistory = [];
    let resizeObserver = null;

    // ============================================================
    // WEBSOCKET — с exponential backoff из A
    // ============================================================
    let klineWs = null, tickerWs = null;
    let klineReconnectTimer = null,  tickerReconnectTimer = null;
    let klineReconnectDelay = 1000,  tickerReconnectDelay = 1000;
    const MAX_WS_DELAY = 30000;

    // ============================================================
    // УТИЛИТЫ
    // ============================================================

    /**
     * Умное форматирование цены — из B (диапазонный подход)
     */
    function formatPrice(price) {
        if (!price && price !== 0) return '—';
        if (price < 0.0001) return price.toPrecision(4);
        if (price < 0.01)   return price.toFixed(6);
        if (price < 1)      return price.toFixed(4);
        if (price < 50)     return price.toFixed(3);
        return price.toFixed(2);
    }

    /**
     * Показать/скрыть loading overlay — из B
     */
    function showLoading(show) {
        document.getElementById('loading-overlay').classList.toggle('hidden', !show);
    }

    /**
     * Тосты — из A (title + message + type + auto fadeOut)
     */
    function showToast(title, message, type = 'info') {
        const container = document.getElementById('toast-container');
        if (!container) return;
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<strong>${title}</strong><span>${message}</span>`;
        container.appendChild(toast);
        setTimeout(() => {
            toast.style.animation = 'toastOut 0.25s ease forwards';
            setTimeout(() => toast.remove(), 250);
        }, 3500);
    }

    /**
     * Получить активный список монет (default + user, уникальные, <= MAX)
     */
    function getActiveCoins() {
        return [...new Set([...defaultCoins, ...userCoins])].slice(0, MAX_TOTAL_COINS);
    }

    // ============================================================
    // UI: РЕНДЕР МОНЕТ — из A (delete badge) + из B (структура)
    // ============================================================
    function renderCoinList() {
        const container = document.getElementById('coin-list');
        if (!container) return;
        container.innerHTML = '';

        getActiveCoins().forEach(coin => {
            const isPinned = defaultCoins.includes(coin);
            const btn = document.createElement('button');
            btn.className = `coin-btn${coin === currentSymbol ? ' active' : ''}${isPinned ? ' pinned' : ''}`;
            btn.textContent = coin.replace('USDT', '');

            if (!isPinned) {
                const del = document.createElement('span');
                del.className = 'btn-del';
                del.innerHTML = '&times;';
                del.onclick = (e) => { e.stopPropagation(); removeCoin(coin); };
                btn.appendChild(del);
            }

            btn.onclick = () => { if (coin !== currentSymbol) changePair(coin); };
            container.appendChild(btn);
        });

        const addBtn = document.createElement('button');
        addBtn.className = 'coin-btn btn-add';
        addBtn.textContent = '+';
        addBtn.onclick = addNewCoin;
        container.appendChild(addBtn);
    }

    function addNewCoin() {
        let input = prompt('Тикер монеты (к USDT), например: XRP, ADA, PEPE:');
        if (!input) return;
        let coin = input.toUpperCase().replace(/[^A-Z0-9]/g, '').trim();
        if (!coin) return;
        if (!coin.endsWith('USDT')) coin += 'USDT';

        const all = getActiveCoins();
        if (all.length >= MAX_TOTAL_COINS) {
            showToast('Лимит', `Максимум ${MAX_TOTAL_COINS} монет`, 'alert-down');
            return;
        }
        if (all.includes(coin)) {
            showToast('Инфо', 'Монета уже добавлена', 'info');
            return;
        }
        userCoins.push(coin);
        localStorage.setItem(STORAGE_COINS, JSON.stringify(userCoins));
        reconnectTicker();
        renderCoinList();
        showToast('Добавлено', `${coin.replace('USDT', '')} в списке`, 'info');
    }

    function removeCoin(coin) {
        userCoins = userCoins.filter(c => c !== coin);
        localStorage.setItem(STORAGE_COINS, JSON.stringify(userCoins));
        sessionStorage.removeItem(`alerted_${coin}`);
        if (currentSymbol === coin) {
            changePair(defaultCoins[0]);
        } else {
            reconnectTicker();
            renderCoinList();
        }
        showToast('Удалено', `${coin.replace('USDT', '')} убран`, 'info');
    }

    // ============================================================
    // UI: ИНИЦИАЛИЗАЦИЯ КНОПОК — из A (indicator visibility persist)
    // ============================================================
    function initUI() {
        // Alerts
        document.getElementById('btn-alerts').classList.toggle('active', alertsEnabled);
        document.getElementById('btn-alerts').onclick = toggleAlerts;

        // Interval buttons
        document.querySelectorAll('#interval-selector .interval-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.interval === currentInterval);
            btn.addEventListener('click', () => {
                if (btn.dataset.interval !== currentInterval) changeInterval(btn.dataset.interval);
            });
        });

        // Indicator toggles
        document.querySelectorAll('#indicator-selector .indicator-toggle').forEach(btn => {
            const ind = btn.dataset.ind;
            btn.classList.toggle('active', indicatorVis[ind]);
            btn.addEventListener('click', () => {
                indicatorVis[ind] = !indicatorVis[ind];
                btn.classList.toggle('active', indicatorVis[ind]);
                localStorage.setItem(STORAGE_INDS, JSON.stringify(indicatorVis));
                applyIndicatorVisibility();
            });
        });

        renderCoinList();
    }

    function applyIndicatorVisibility() {
        const map = {
            MACD: document.getElementById('macd-chart'),
            RSI:  document.getElementById('rsi-chart'),
            ADX:  document.getElementById('adx-chart'),
        };
        Object.entries(map).forEach(([ind, el]) => {
            if (!el) return;
            el.style.display = indicatorVis[ind] ? 'block' : 'none';
        });
        // Принудительный ресайз видимых графиков
        requestAnimationFrame(() => {
            if (indicatorVis.MACD && charts.macd) charts.macd.applyOptions({ width: map.MACD.clientWidth, height: 160 });
            if (indicatorVis.RSI  && charts.rsi)  charts.rsi.applyOptions({ width: map.RSI.clientWidth, height: 160 });
            if (indicatorVis.ADX  && charts.adx)  charts.adx.applyOptions({ width: map.ADX.clientWidth, height: 160 });
        });
    }

    // ============================================================
    // SMART ALERTS — из A (≥2%, sessionStorage dedupe, 15-мин cooldown)
    // ============================================================
    function toggleAlerts() {
        alertsEnabled = !alertsEnabled;
        localStorage.setItem(STORAGE_ALERTS, alertsEnabled ? 'true' : 'false');
        document.getElementById('btn-alerts').classList.toggle('active', alertsEnabled);
        showToast('Smart Alerts', alertsEnabled ? 'Мониторинг ≥2% запущен' : 'Мониторинг отключён', 'info');
    }

    function checkAlert(symbol, price, changePct) {
        if (!alertsEnabled || Math.abs(changePct) < 2.0) return;
        const key  = `alerted_${symbol}`;
        const last = sessionStorage.getItem(key);
        const now  = Date.now();
        if (last && now - parseInt(last) < 15 * 60 * 1000) return;
        const dir  = changePct > 0 ? '🚀 ПАМП' : '🩸 ДАМП';
        const type = changePct > 0 ? 'alert-up' : 'alert-down';
        showToast(`${dir}: ${symbol.replace('USDT', '')}`,
            `${formatPrice(price)} (${changePct > 0 ? '+' : ''}${changePct.toFixed(2)}%)`, type);
        sessionStorage.setItem(key, now.toString());
    }

    // ============================================================
    // ИНИЦИАЛИЗАЦИЯ ГРАФИКОВ — архитектура из B (commonOptions, DRY)
    //   + destroyCharts перед реинициализацией (memory leak fix)
    //   + ResizeObserver с rAF из B
    // ============================================================
    function destroyCharts() {
        if (resizeObserver) { resizeObserver.disconnect(); resizeObserver = null; }
        Object.values(charts).forEach(c => { try { if (c) c.remove(); } catch (_) {} });
        charts.main = charts.macd = charts.rsi = charts.adx = null;
        Object.keys(series).forEach(k => delete series[k]);
    }

    function initCharts() {
        destroyCharts();

        const containers = {
            main: document.getElementById('main-chart'),
            macd: document.getElementById('macd-chart'),
            rsi:  document.getElementById('rsi-chart'),
            adx:  document.getElementById('adx-chart'),
        };

        // Общие опции (DRY — из B)
        const commonOpts = {
            layout: {
                textColor: C.text,
                background: { type: 'solid', color: C.bg },
            },
            grid: {
                vertLines: { color: C.grid },
                horzLines: { color: C.grid },
            },
            crosshair: {
                mode: LightweightCharts.CrosshairMode.Normal,
                vertLine: { width: 1, color: 'rgba(255,255,255,0.25)', style: LightweightCharts.LineStyle.Dashed },
                horzLine: { width: 1, color: 'rgba(255,255,255,0.25)', style: LightweightCharts.LineStyle.Dashed },
            },
            timeScale: {
                borderColor: C.grid,
                timeVisible: true,
                secondsVisible: false,
                rightBarStaysOnScroll: true,
                rightOffset: 5,
                tickMarkFormatter: (time, tickMarkType) => {
                    const d = new Date(time * 1000);
                    if (tickMarkType <= 1) {
                        return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
                    }
                    return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
                },
            },
            handleScroll: {
                vertTouchDrag: false,
                horzTouchDrag: true,
                mouseWheel: true,
            },
            handleScale: {
                axisPressedMouseMove: { time: true, price: true },
                mouseWheel: true,
                pinch: true,
            },
        };

        // Опции для индикаторных графиков (без оси времени — из B)
        const indOpts = {
            ...commonOpts,
            timeScale: { ...commonOpts.timeScale, visible: false },
        };

        // ---- Основной график ----
        charts.main = LightweightCharts.createChart(containers.main, {
            ...commonOpts,
            rightPriceScale: {
                borderColor: C.grid,
                scaleMargins: { top: 0.1, bottom: 0.25 },
            },

        series.candle = charts.main.addCandlestickSeries({
            upColor: C.up, downColor: C.down,
            borderVisible: false,
            wickUpColor: C.up, wickDownColor: C.down,
        });

        // Объёмы — скрытая шкала (из B: visible:false)
        charts.main.priceScale('volume').applyOptions({
            scaleMargins: { top: 0.8, bottom: 0 },
            visible: false,
        });
        series.volume = charts.main.addHistogramSeries({ priceScaleId: 'volume' });

        // VWAP — золотой цвет (из B)
        series.vwap = charts.main.addLineSeries({
            color: C.vwap,
            lineWidth: 1,
            crosshairMarkerVisible: false,
            lastValueVisible: false,
            priceLineVisible: false,
        });

        // ---- MACD ----
        charts.macd = LightweightCharts.createChart(containers.macd, {
            ...indOpts,
            rightPriceScale: { borderColor: C.grid, scaleMargins: { top: 0.1, bottom: 0.1 } },
        });
        series.macdHist   = charts.macd.addHistogramSeries({ priceScaleId: '' });
        series.macdLine   = charts.macd.addLineSeries({ color: C.macd,   lineWidth: 2, priceLineVisible: false, lastValueVisible: true });
        series.macdSignal = charts.macd.addLineSeries({ color: C.signal, lineWidth: 2, priceLineVisible: false, lastValueVisible: true });

        // ---- RSI ----
        charts.rsi = LightweightCharts.createChart(containers.rsi, {
            ...indOpts,
            rightPriceScale: { borderColor: C.grid, scaleMargins: { top: 0.05, bottom: 0.05 } },
        });
        series.rsi = charts.rsi.addLineSeries({ color: C.rsi, lineWidth: 2, priceLineVisible: false, lastValueVisible: true });
        series.rsi.createPriceLine({ price: 70, color: 'rgba(242,54,69,0.4)',   lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed, axisLabelVisible: false });
        series.rsi.createPriceLine({ price: 30, color: 'rgba(8,153,129,0.4)',   lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed, axisLabelVisible: false });
        series.rsi.createPriceLine({ price: 50, color: 'rgba(120,123,134,0.2)', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed, axisLabelVisible: false });

        // ---- ADX ----
        charts.adx = LightweightCharts.createChart(containers.adx, {
            ...indOpts,
            rightPriceScale: { borderColor: C.grid, scaleMargins: { top: 0.05, bottom: 0.05 } },
        });
        series.adx = charts.adx.addLineSeries({ color: C.adx, lineWidth: 2, priceLineVisible: false, lastValueVisible: true });
        series.pdi = charts.adx.addLineSeries({ color: C.pdi, lineWidth: 1, priceLineVisible: false, lastValueVisible: true });
        series.ndi = charts.adx.addLineSeries({ color: C.ndi, lineWidth: 1, priceLineVisible: false, lastValueVisible: true });
        // Линия тренда (ADX > 25 = сильный тренд)
        series.adx.createPriceLine({ price: 25, color: 'rgba(255,214,0,0.3)', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed, axisLabelVisible: false });

        // ---- СИНХРОНИЗАЦИЯ TIMESCALE (из B: LogicalRange + isSyncing flag) ----
        const chartList = [charts.main, charts.macd, charts.rsi, charts.adx];
        let isSyncing = false;
        chartList.forEach(src => {
            src.timeScale().subscribeVisibleLogicalRangeChange(range => {
                if (isSyncing || !range) return;
                isSyncing = true;
                chartList.forEach(tgt => {
                    if (tgt !== src) tgt.timeScale().setVisibleLogicalRange(range);
                });
                isSyncing = false;
            });
        });

        // ---- СИНХРОНИЗАЦИЯ CROSSHAIR (из B: двусторонняя) ----
        function syncCrosshair(src, targets) {
            src.subscribeCrosshairMove(param => {
                if (!param.time) {
                    targets.forEach(t => { try { t.clearCrosshairPosition(); } catch (_) {} });
                    return;
                }
                if (src === charts.main) {
                    const data = param.seriesData.get(series.candle);
                    if (data) updateLegend(data);
                }
                const price = param.seriesPrices?.get(series.candle) ?? 0;
                targets.forEach(t => {
                    try { t.setCrosshairPosition(price, param.time, series.candle); } catch (_) {}
                });
            });
        }
        syncCrosshair(charts.main, [charts.macd, charts.rsi, charts.adx]);
        syncCrosshair(charts.macd, [charts.main, charts.rsi, charts.adx]);
        syncCrosshair(charts.rsi,  [charts.main, charts.macd, charts.adx]);
        syncCrosshair(charts.adx,  [charts.main, charts.macd, charts.rsi]);

        // ---- RESIZE OBSERVER (из B: rAF + applyOptions) ----
        resizeObserver = new ResizeObserver(entries => {
            requestAnimationFrame(() => {
                entries.forEach(({ target, contentRect: { width, height } }) => {
                    if (width <= 0 || height <= 0) return;
                    const chart = charts[target.id.replace('-chart', '')] ||
                                  (target.id === 'main-chart' ? charts.main : null);
                    if (chart) chart.applyOptions({ width, height });
                });
            });
        });
        Object.values(containers).forEach(c => resizeObserver.observe(c));

        // Применить видимость индикаторов
        applyIndicatorVisibility();
    }

    // ============================================================
    // ЛЕГЕНДА — из B (legend-title + OHLCV цветные)
    // ============================================================
    function updateLegend(candle) {
        if (!candle) return;
        const color = candle.close >= candle.open ? C.up : C.down;
        const titleEl = document.getElementById('legend-title');
        if (titleEl) titleEl.textContent = `${currentSymbol} • ${currentInterval}`;
        ['open','high','low','close'].forEach(k => {
            const el = document.getElementById(`info-${k}`);
            if (el) { el.textContent = formatPrice(candle[k]); el.style.color = color; }
        });
        const volEl = document.getElementById('info-vol');
        if (volEl) { volEl.textContent = candle.volume ? candle.volume.toFixed(2) : '0'; volEl.style.color = color; }
    }

    // ============================================================
    // РАСЧЁТ ИНДИКАТОРОВ — единый O(n) проход из B
    //   c отдельными именованными функциями-секциями как в A
    // ============================================================
    function calculateIndicators(data) {
        if (!data.length) return {
            vwap: [], macd: { macdLine: [], signalLine: [], hist: [] },
            rsi: [], adx: { adx: [], pdi: [], ndi: [] }
        };

        const RSI_PERIOD = 14;
        const ADX_PERIOD = 14;

        // VWAP накопители
        let sumTPV = 0, sumVol = 0;
        // MACD EMA коэффициенты (стандарт)
        const k12 = 2/13, k26 = 2/27, k9 = 2/10;
        let ema12 = data[0].close, ema26 = data[0].close, emaSignal = 0;
        // RSI накопители
        let gains = 0, losses = 0, avgGain = 0, avgLoss = 0;
        // ADX накопители
        let trSum = 0, plusDmSum = 0, minusDmSum = 0;
        let avgTr = 0, avgPlusDm = 0, avgMinusDm = 0;

        const out = {
            vwap: [],
            macd: { macdLine: [], signalLine: [], hist: [] },
            rsi:  [],
            adx:  { adx: [], pdi: [], ndi: [] }
        };

        for (let i = 0; i < data.length; i++) {
            const c    = data[i];
            const prev = i > 0 ? data[i - 1] : c;

            // --- VWAP ---
            sumTPV += ((c.high + c.low + c.close) / 3) * c.volume;
            sumVol += c.volume;
            out.vwap.push({ time: c.time, value: sumVol ? sumTPV / sumVol : c.close });

            // --- MACD ---
            ema12 = (c.close - ema12) * k12 + ema12;
            ema26 = (c.close - ema26) * k26 + ema26;
            const macdVal = ema12 - ema26;
            if (i === 0) emaSignal = macdVal;
            else         emaSignal = (macdVal - emaSignal) * k9 + emaSignal;
            const histVal = macdVal - emaSignal;
            out.macd.macdLine.push({ time: c.time, value: macdVal });
            out.macd.signalLine.push({ time: c.time, value: emaSignal });
            out.macd.hist.push({ time: c.time, value: histVal, color: histVal >= 0 ? C.histUp : C.histDown });

            // --- RSI ---
            if (i > 0) {
                const change = c.close - prev.close;
                if (i <= RSI_PERIOD) {
                    if (change > 0) gains += change;
                    else            losses -= change;
                    if (i === RSI_PERIOD) { avgGain = gains / RSI_PERIOD; avgLoss = losses / RSI_PERIOD; }
                } else {
                    avgGain = (avgGain * (RSI_PERIOD - 1) + (change > 0 ? change : 0)) / RSI_PERIOD;
                    avgLoss = (avgLoss * (RSI_PERIOD - 1) + (change < 0 ? -change : 0)) / RSI_PERIOD;
                }
            }
            if (i >= RSI_PERIOD) {
                const rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
                out.rsi.push({ time: c.time, value: 100 - (100 / (1 + rs)) });
            }

            // --- ADX ---
            if (i > 0) {
                const tr      = Math.max(c.high - c.low, Math.abs(c.high - prev.close), Math.abs(c.low - prev.close));
                const upMove  = c.high - prev.high;
                const dnMove  = prev.low - c.low;
                const plusDm  = (upMove > dnMove && upMove > 0) ? upMove : 0;
                const minusDm = (dnMove > upMove && dnMove > 0) ? dnMove : 0;

                if (i <= ADX_PERIOD) {
                    trSum += tr; plusDmSum += plusDm; minusDmSum += minusDm;
                    if (i === ADX_PERIOD) {
                        avgTr = trSum / ADX_PERIOD;
                        avgPlusDm = plusDmSum / ADX_PERIOD;
                        avgMinusDm = minusDmSum / ADX_PERIOD;
                    }
                } else {
                    // Wilder smoothing (правильная формула)
                    avgTr      = avgTr - (avgTr / ADX_PERIOD) + tr;
                    avgPlusDm  = avgPlusDm - (avgPlusDm / ADX_PERIOD) + plusDm;
                    avgMinusDm = avgMinusDm - (avgMinusDm / ADX_PERIOD) + minusDm;
                }

                if (i >= ADX_PERIOD) {
                    const diPlus  = avgTr > 0 ? (avgPlusDm / avgTr) * 100 : 0;
                    const diMinus = avgTr > 0 ? (avgMinusDm / avgTr) * 100 : 0;
                    const dx      = (diPlus + diMinus) > 0 ? Math.abs(diPlus - diMinus) / (diPlus + diMinus) * 100 : 0;
                    const prevAdx = out.adx.adx.length > 0 ? out.adx.adx[out.adx.adx.length - 1].value : dx;
                    const adxVal  = out.adx.adx.length === 0 ? dx : (prevAdx * (ADX_PERIOD - 1) + dx) / ADX_PERIOD;

                    out.adx.adx.push({ time: c.time, value: adxVal });
                    out.adx.pdi.push({ time: c.time, value: diPlus });
                    out.adx.ndi.push({ time: c.time, value: diMinus });
                }
            }
        }

        return out;
    }

    // ============================================================
    // ЗАГРУЗКА ИСТОРИИ — из B (отдельная setData логика) + из A (dynamic precision)
    // ============================================================
    async function loadHistory() {
        showLoading(true);
        try {
            const url = `https://api.binance.com/api/v3/klines?symbol=${currentSymbol}&interval=${currentInterval}&limit=${MAX_CANDLES}`;
            const resp = await fetch(url);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const raw = await resp.json();

            candleHistory = raw.map(k => ({
                time:   Math.floor(k[0] / 1000),
                open:   parseFloat(k[1]),
                high:   parseFloat(k[2]),
                low:    parseFloat(k[3]),
                close:  parseFloat(k[4]),
                volume: parseFloat(k[5]),
            }));

            if (!candleHistory.length) return false;

            // Динамическая точность шкалы (из A)
            const sample = candleHistory[candleHistory.length - 1].close;
            let prec = 2, minMove = 0.01;
            if      (sample < 0.0001) { prec = 8; minMove = 0.00000001; }
            else if (sample < 0.01)   { prec = 6; minMove = 0.000001; }
            else if (sample < 1)      { prec = 4; minMove = 0.0001; }
            series.candle.applyOptions({ priceFormat: { type: 'price', precision: prec, minMove } });

            // Установка данных
            series.candle.setData(candleHistory);
            series.volume.setData(candleHistory.map(c => ({
                time: c.time, value: c.volume,
                color: c.close >= c.open ? C.histUp : C.histDown,
            })));

            const inds = calculateIndicators(candleHistory);
            series.vwap.setData(inds.vwap);
            series.macdHist.setData(inds.macd.hist);
            series.macdLine.setData(inds.macd.macdLine);
            series.macdSignal.setData(inds.macd.signalLine);
            series.rsi.setData(inds.rsi);
            series.adx.setData(inds.adx.adx);
            series.pdi.setData(inds.adx.pdi);
            series.ndi.setData(inds.adx.ndi);

            charts.main.timeScale().fitContent();
            // Синхронизировать диапазон после fitContent
            const range = charts.main.timeScale().getVisibleLogicalRange();
            if (range) {
                [charts.macd, charts.rsi, charts.adx].forEach(ch => {
                    if (ch) ch.timeScale().setVisibleLogicalRange(range);
                });
            }

            updateLegend(candleHistory[candleHistory.length - 1]);
            return true;
        } catch (err) {
            console.error('❌ loadHistory:', err);
            showToast('Ошибка', 'Не удалось загрузить историю', 'alert-down');
            return false;
        } finally {
            showLoading(false);
        }
    }

    // ============================================================
    // WEBSOCKET: KLINE — из A (exponential backoff) + из B (guard + try-catch)
    // ============================================================
    function connectKline() {
        if (klineWs) {
            klineWs.onclose = null;
            klineWs.close();
            klineWs = null;
        }
        if (klineReconnectTimer) { clearTimeout(klineReconnectTimer); klineReconnectTimer = null; }

        const url = `wss://stream.binance.com:9443/ws/${currentSymbol.toLowerCase()}@kline_${currentInterval}`;
        klineWs = new WebSocket(url);

        klineWs.onopen = () => {
            klineReconnectDelay = 1000;
        };

        klineWs.onmessage = (e) => {
            try {
                const { k } = JSON.parse(e.data);
                if (!k) return;
                const candle = {
                    time:   Math.floor(k.t / 1000),
                    open:   parseFloat(k.o),
                    high:   parseFloat(k.h),
                    low:    parseFloat(k.l),
                    close:  parseFloat(k.c),
                    volume: parseFloat(k.v),
                };

                // Обновить историю
                const last = candleHistory[candleHistory.length - 1];
                if (!last || last.time !== candle.time) {
                    candleHistory.push(candle);
                    if (candleHistory.length > MAX_CANDLES) candleHistory.shift();
                } else {
                    candleHistory[candleHistory.length - 1] = candle;
                }

                // Быстрое обновление свечи и объёма
                series.candle.update(candle);
                series.volume.update({
                    time: candle.time, value: candle.volume,
                    color: candle.close >= candle.open ? C.histUp : C.histDown,
                });

                // Пересчёт индикаторов (только хвост)
                const inds = calculateIndicators(candleHistory);
                const last1 = (arr) => arr.length ? arr[arr.length - 1] : null;

                const v = last1(inds.vwap); if (v) series.vwap.update(v);
                const mL = last1(inds.macd.macdLine);
                const mS = last1(inds.macd.signalLine);
                const mH = last1(inds.macd.hist);
                if (mL) series.macdLine.update(mL);
                if (mS) series.macdSignal.update(mS);
                if (mH) series.macdHist.update(mH);
                const r = last1(inds.rsi); if (r) series.rsi.update(r);
                const ax = last1(inds.adx.adx); if (ax) series.adx.update(ax);
                const pd = last1(inds.adx.pdi);  if (pd) series.pdi.update(pd);
                const nd = last1(inds.adx.ndi);  if (nd) series.ndi.update(nd);

                updateLegend(candle);
            } catch (err) {
                console.error('Kline parse error:', err);
            }
        };

        klineWs.onclose = () => {
            klineReconnectTimer = setTimeout(() => {
                klineReconnectDelay = Math.min(klineReconnectDelay * 2, MAX_WS_DELAY);
                connectKline();
            }, klineReconnectDelay);
        };

        klineWs.onerror = (err) => console.error('Kline WS error:', err);
    }

    // ============================================================
    // WEBSOCKET: TICKER — из A (exponential backoff + checkAlert)
    // ============================================================
    function connectTicker() {
        if (tickerWs) { tickerWs.onclose = null; tickerWs.close(); tickerWs = null; }
        if (tickerReconnectTimer) { clearTimeout(tickerReconnectTimer); tickerReconnectTimer = null; }

        const coins   = getActiveCoins();
        if (!coins.length) return;
        const streams = coins.map(c => `${c.toLowerCase()}@ticker`).join('/');
        tickerWs = new WebSocket(`wss://stream.binance.com:9443/ws/${streams}`);

        tickerWs.onopen = () => { tickerReconnectDelay = 1000; };

        tickerWs.onmessage = (e) => {
            try {
                const data = JSON.parse(e.data);
                if (!data?.s) return;
                const sym       = data.s;
                const rawPrice  = parseFloat(data.c);
                const changePct = parseFloat(data.P);
                prices[sym] = rawPrice;

                if (sym === currentSymbol) {
                    const el = document.getElementById('ticker-price');
                    if (el) {
                        el.textContent = formatPrice(rawPrice);
                        el.className   = changePct >= 0 ? 'price-up' : 'price-down';
                    }
                }
                checkAlert(sym, rawPrice, changePct);
            } catch (err) {
                console.error('Ticker parse error:', err);
            }
        };

        tickerWs.onclose = () => {
            tickerReconnectTimer = setTimeout(() => {
                tickerReconnectDelay = Math.min(tickerReconnectDelay * 2, MAX_WS_DELAY);
                connectTicker();
            }, tickerReconnectDelay);
        };

        tickerWs.onerror = (err) => console.error('Ticker WS error:', err);
    }

    function reconnectTicker() {
        tickerReconnectDelay = 1000;
        connectTicker();
    }

    // ============================================================
    // СМЕНА ПАРЫ / ИНТЕРВАЛА — из B (guard) + из A (renderCoinList)
    // ============================================================
    async function changePair(symbol) {
        if (symbol === currentSymbol) return;
        currentSymbol = symbol;

        const displaySym = symbol.replace('USDT', '');
        const symEl = document.getElementById('ticker-sym');
        const prcEl = document.getElementById('ticker-price');
        if (symEl) symEl.textContent = displaySym;
        if (prcEl) {
            prcEl.textContent = prices[symbol] ? formatPrice(prices[symbol]) : '...';
            prcEl.className   = '';
        }
        const titleEl = document.getElementById('legend-title');
        if (titleEl) titleEl.textContent = `${symbol} • ${currentInterval}`;

        renderCoinList();
        const ok = await loadHistory();
        if (ok) connectKline();
    }

    async function changeInterval(interval) {
        if (interval === currentInterval) return;
        currentInterval = interval;

        document.querySelectorAll('#interval-selector .interval-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.interval === interval);
        });

        const titleEl = document.getElementById('legend-title');
        if (titleEl) titleEl.textContent = `${currentSymbol} • ${interval}`;

        const ok = await loadHistory();
        if (ok) connectKline();
    }

    // ============================================================
    // CLEANUP — из A (beforeunload)
    // ============================================================
    window.addEventListener('beforeunload', () => {
        if (klineWs)  { klineWs.onclose  = null; klineWs.close(); }
        if (tickerWs) { tickerWs.onclose = null; tickerWs.close(); }
        if (klineReconnectTimer)  clearTimeout(klineReconnectTimer);
        if (tickerReconnectTimer) clearTimeout(tickerReconnectTimer);
        if (resizeObserver)       resizeObserver.disconnect();
    });

    // ============================================================
    // СТАРТ
    // ============================================================
    initUI();
    initCharts();
    loadHistory().then(ok => { if (ok) connectKline(); });
    connectTicker();

})();
</script>
</body>
</html>
