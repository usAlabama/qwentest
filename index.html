<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Crypto Terminal Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root {
            --bg-dark: #131722;
            --bg-panel: #1e222d;
            --bg-btn-hover: #2a2e39;
            --border: #2a2e39;
            --accent: #2962ff;
            --text-main: #d1d4dc;
            --text-muted: #787b86;
            --up-color: #089981;
            --down-color: #f23645;
            --panel-height: 44px;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            margin: 0; padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Trebuchet MS", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            overscroll-behavior: none;
        }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        header {
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            padding: 0 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: var(--panel-height);
            flex-shrink: 0;
            z-index: 10;
        }

        .header-left { display: flex; align-items: center; gap: 16px; }

        .logo { font-weight: 800; font-size: 0.85rem; letter-spacing: 1px; color: var(--text-main); }
        .logo span { color: var(--accent); }

        .price-ticker {
            font-size: 0.9rem; font-weight: 700; display: flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,0.04); padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); min-width: 140px; justify-content: center;
        }

        .price-up { color: var(--up-color); }
        .price-down { color: var(--down-color); }

        .controls-row {
            display: flex; flex-direction: column; flex-shrink: 0; background: var(--bg-dark); border-bottom: 1px solid var(--border);
        }

        .horizontal-scroll {
            display: flex; gap: 6px; padding: 8px 16px; overflow-x: auto; align-items: center; scrollbar-width: none;
        }
        .horizontal-scroll::-webkit-scrollbar { display: none; }

        .coin-btn, .interval-btn {
            background: var(--bg-panel); border: 1px solid var(--border); color: var(--text-muted);
            border-radius: 6px; cursor: pointer; font-weight: 600; white-space: nowrap; transition: all 0.2s;
            display: inline-flex; align-items: center; justify-content: center;
        }

        .coin-btn { padding: 6px 14px; font-size: 0.75rem; position: relative; }
        .interval-btn { padding: 4px 12px; font-size: 0.75rem; }

        .coin-btn.active, .interval-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
        .coin-btn:not(.pinned) { padding-right: 30px; }
        
        .btn-del {
            position: absolute; right: 4px; width: 20px; height: 20px; border-radius: 4px;
            display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--text-muted);
        }

        #charts-wrapper {
            flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto; overflow-x: hidden;
            background-color: var(--bg-dark); position: relative;
        }

        .chart-container {
            width: 100%; position: relative; background-color: var(--bg-dark);
            border-bottom: 1px solid var(--border); flex-shrink: 0;
        }

        #main-chart { flex-grow: 1; min-height: 350px; }
        .indicator-chart { height: 160px; }

        .chart-legend {
            position: absolute; top: 8px; left: 12px; z-index: 5; pointer-events: none;
            display: flex; flex-direction: column; gap: 4px; background: rgba(19, 23, 34, 0.7);
            padding: 4px 8px; border-radius: 4px;
        }

        .chart-title { font-size: 0.8rem; color: var(--text-main); font-weight: 700; }
        .chart-values { font-size: 0.75rem; display: flex; gap: 8px; font-variant-numeric: tabular-nums; color: var(--text-muted); }

        #loading-overlay {
            position: absolute; inset: 0; background: rgba(19, 23, 34, 0.9); z-index: 50;
            display: flex; align-items: center; justify-content: center; color: var(--accent); font-weight: 600;
            transition: opacity 0.3s;
        }
        .hidden { opacity: 0; pointer-events: none; }

        .spinner {
            width: 24px; height: 24px; border: 3px solid rgba(41, 98, 255, 0.3); border-radius: 50%;
            border-top-color: var(--accent); animation: spin 1s ease-in-out infinite; margin-right: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <div class="logo">TRADE<span>.CORE</span></div>
            <div class="price-ticker" id="global-ticker">
                <span id="ticker-sym">BTC</span> <span id="ticker-price">...</span>
            </div>
        </div>
    </header>

    <div class="controls-row">
        <div class="horizontal-scroll" id="coin-list"></div>
        <div class="horizontal-scroll" id="interval-list">
            <button class="interval-btn" data-interval="1m">1m</button>
            <button class="interval-btn" data-interval="5m">5m</button>
            <button class="interval-btn active" data-interval="15m">15m</button>
            <button class="interval-btn" data-interval="1h">1h</button>
            <button class="interval-btn" data-interval="4h">4h</button>
            <button class="interval-btn" data-interval="1d">1d</button>
        </div>
    </div>

    <div id="charts-wrapper">
        <div id="loading-overlay"><div class="spinner"></div> Загрузка истории...</div>
        
        <div id="main-chart" class="chart-container">
            <div class="chart-legend">
                <div class="chart-title" id="legend-title">BTCUSDT</div>
                <div class="chart-values" id="legend-values">
                    <div>O <span id="info-open">-</span></div>
                    <div>H <span id="info-high">-</span></div>
                    <div>L <span id="info-low">-</span></div>
                    <div>C <span id="info-close">-</span></div>
                    <div>V <span id="info-vol">-</span></div>
                </div>
            </div>
        </div>
        
        <div id="macd-chart" class="chart-container indicator-chart">
            <div class="chart-legend"><div class="chart-title">MACD (12, 26, 9)</div></div>
        </div>
        
        <div id="rsi-chart" class="chart-container indicator-chart">
            <div class="chart-legend"><div class="chart-title">RSI (14)</div></div>
        </div>

        <div id="adx-chart" class="chart-container indicator-chart">
            <div class="chart-legend"><div class="chart-title">ADX (14)</div></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            tg.setHeaderColor('#1e222d');
            tg.setBackgroundColor('#131722');
        }

        const MAX_CANDLES = 1000; // Увеличен лимит для отображения глубокой истории
        const defaultCoins = ['BTCUSDT', 'ETHUSDT'];
        let userCoins = ['SOLUSDT', 'TONUSDT', 'PEPEUSDT'];
        
        let currentSymbol = 'BTCUSDT';
        let currentInterval = '15m';

        // Глобальные переменные графиков
        const charts = { main: null, macd: null, rsi: null, adx: null };
        const series = {};
        let candleHistory = [];
        let prices = {};
        
        let klineWs = null;
        let tickerWs = null;
        let resizeObserver = null;

        const COLORS = {
            up: '#089981', down: '#f23645', bg: '#131722', grid: '#2a2e39', text: '#787b86',
            macdLine: '#2962ff', signalLine: '#ff6d00', rsiLine: '#9c27b0', vwapLine: '#fcc201',
            adx: '#2962ff', pdi: '#089981', ndi: '#f23645'
        };

        function formatPrice(price) {
            if (price < 0.0001) return price.toPrecision(4);
            if (price < 1) return price.toFixed(4);
            if (price < 50) return price.toFixed(3);
            return price.toFixed(2);
        }

        function showLoading(show) {
            document.getElementById('loading-overlay').classList.toggle('hidden', !show);
        }

        // Рендер UI
        function renderCoinList() {
            const container = document.getElementById('coin-list');
            container.innerHTML = '';
            const allCoins = [...new Set([...defaultCoins, ...userCoins])];

            allCoins.forEach(coin => {
                const isPinned = defaultCoins.includes(coin);
                const btn = document.createElement('button');
                btn.className = `coin-btn ${coin === currentSymbol ? 'active' : ''} ${isPinned ? 'pinned' : ''}`;
                btn.innerText = coin.replace('USDT', '');

                btn.onclick = () => { if (coin !== currentSymbol) changePair(coin); };
                container.appendChild(btn);
            });
        }

        document.querySelectorAll('.interval-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const interval = btn.dataset.interval;
                if (interval !== currentInterval) changeInterval(interval, btn);
            });
        });

        // ==========================================
        // ИНИЦИАЛИЗАЦИЯ И СИНХРОНИЗАЦИЯ ГРАФИКОВ
        // ==========================================
        function destroyCharts() {
            if (resizeObserver) { resizeObserver.disconnect(); resizeObserver = null; }
            Object.values(charts).forEach(c => { if (c) c.remove(); });
            charts.main = charts.macd = charts.rsi = charts.adx = null;
            Object.keys(series).forEach(key => delete series[key]);
        }

        function initCharts() {
            destroyCharts();
            
            const containers = {
                main: document.getElementById('main-chart'),
                macd: document.getElementById('macd-chart'),
                rsi: document.getElementById('rsi-chart'),
                adx: document.getElementById('adx-chart')
            };

            const commonOptions = {
                layout: { textColor: COLORS.text, background: { type: 'solid', color: COLORS.bg } },
                grid: { vertLines: { color: COLORS.grid }, horzLines: { color: COLORS.grid } },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                timeScale: { borderColor: COLORS.grid, timeVisible: true, rightOffset: 5 }
            };

            // 1. Главный график
            charts.main = LightweightCharts.createChart(containers.main, {
                ...commonOptions,
                rightPriceScale: { borderColor: COLORS.grid, scaleMargins: { top: 0.1, bottom: 0.25 } }
            });

            series.candle = charts.main.addCandlestickSeries({
                upColor: COLORS.up, downColor: COLORS.down, borderVisible: false,
                wickUpColor: COLORS.up, wickDownColor: COLORS.down
            });

            // ОБЪЕМЫ: Отдельная шкала для масштабирования снизу
            charts.main.priceScale('volume').applyOptions({
                scaleMargins: { top: 0.8, bottom: 0 },
                visible: false // Скрываем цифры оси для объемов
            });
            series.volume = charts.main.addHistogramSeries({
                priceScaleId: 'volume',
                color: '#26a69a'
            });

            series.vwap = charts.main.addLineSeries({
                color: COLORS.vwapLine, lineWidth: 1, crosshairMarkerVisible: false, lastValueVisible: false
            });

            // 2. Индикаторы (Без отображения шкалы времени снизу)
            const indOptions = { ...commonOptions, timeScale: { visible: false } };

            charts.macd = LightweightCharts.createChart(containers.macd, indOptions);
            series.macdHist = charts.macd.addHistogramSeries({ priceScaleId: '' });
            series.macdLine = charts.macd.addLineSeries({ color: COLORS.macdLine, lineWidth: 2 });
            series.macdSignal = charts.macd.addLineSeries({ color: COLORS.signalLine, lineWidth: 2 });

            charts.rsi = LightweightCharts.createChart(containers.rsi, indOptions);
            series.rsi = charts.rsi.addLineSeries({ color: COLORS.rsiLine, lineWidth: 2 });
            series.rsi.createPriceLine({ price: 70, color: 'rgba(242, 54, 69, 0.5)', lineWidth: 1, lineStyle: 2, axisLabelVisible: false });
            series.rsi.createPriceLine({ price: 30, color: 'rgba(8, 153, 129, 0.5)', lineWidth: 1, lineStyle: 2, axisLabelVisible: false });

            charts.adx = LightweightCharts.createChart(containers.adx, indOptions);
            series.adx = charts.adx.addLineSeries({ color: COLORS.adx, lineWidth: 2 });
            series.pdi = charts.adx.addLineSeries({ color: COLORS.pdi, lineWidth: 1 });
            series.ndi = charts.adx.addLineSeries({ color: COLORS.ndi, lineWidth: 1 });

            // 3. ЖЕСТКАЯ СИНХРОНИЗАЦИЯ (Ось времени)
            // Использование LogicalRange обеспечивает точную привязку свеча-к-свече
            const chartInstances = [charts.main, charts.macd, charts.rsi, charts.adx];
            let isSyncing = false;

            chartInstances.forEach(sourceChart => {
                sourceChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
                    if (isSyncing || !range) return;
                    isSyncing = true;
                    chartInstances.forEach(targetChart => {
                        if (targetChart !== sourceChart) {
                            targetChart.timeScale().setVisibleLogicalRange(range);
                        }
                    });
                    isSyncing = false;
                });
            });

            // 4. СИНХРОНИЗАЦИЯ КУРСОРА (Crosshair)
            function syncCrosshair(sourceChart, targetCharts) {
                sourceChart.subscribeCrosshairMove(param => {
                    if (!param.time) {
                        targetCharts.forEach(c => c.clearCrosshairPosition());
                        return;
                    }
                    const dataPoint = param.seriesData.get(series.candle);
                    if (dataPoint) updateLegend(dataPoint);
                    
                    targetCharts.forEach(c => {
                        // Эмулируем движение перекрестия на других графиках
                        c.setCrosshairPosition(param.seriesPrices.get(series.candle) || 0, param.time, series.candle);
                    });
                });
            }

            syncCrosshair(charts.main, [charts.macd, charts.rsi, charts.adx]);
            syncCrosshair(charts.macd, [charts.main, charts.rsi, charts.adx]);
            syncCrosshair(charts.rsi, [charts.main, charts.macd, charts.adx]);
            syncCrosshair(charts.adx, [charts.main, charts.macd, charts.rsi]);

            // Resize Observer
            resizeObserver = new ResizeObserver(entries => {
                requestAnimationFrame(() => {
                    entries.forEach(entry => {
                        const { width, height } = entry.contentRect;
                        if (width > 0 && height > 0) {
                            if (entry.target.id === 'main-chart') charts.main.applyOptions({ width, height });
                            if (entry.target.id === 'macd-chart') charts.macd.applyOptions({ width, height });
                            if (entry.target.id === 'rsi-chart') charts.rsi.applyOptions({ width, height });
                            if (entry.target.id === 'adx-chart') charts.adx.applyOptions({ width, height });
                        }
                    });
                });
            });
            Object.values(containers).forEach(c => resizeObserver.observe(c));
        }

        function updateLegend(data) {
            if (!data) return;
            const color = data.close >= data.open ? COLORS.up : COLORS.down;
            document.getElementById('legend-title').innerText = `${currentSymbol} • ${currentInterval}`;
            
            document.getElementById('info-open').innerText = formatPrice(data.open);
            document.getElementById('info-high').innerText = formatPrice(data.high);
            document.getElementById('info-low').innerText = formatPrice(data.low);
            document.getElementById('info-close').innerText = formatPrice(data.close);
            document.getElementById('info-vol').innerText = data.volume ? data.volume.toFixed(2) : '0';
            
            ['open', 'high', 'low', 'close', 'vol'].forEach(type => {
                document.getElementById(`info-${type}`).style.color = color;
            });
        }

        // ==========================================
        // МАТЕМАТИКА ИНДИКАТОРОВ
        // ==========================================
        function calculateIndicators(data) {
            const vwap = [], macdLine = [], signalLine = [], hist = [], rsi = [];
            const adx = [], pdi = [], ndi = [];
            
            if (data.length === 0) return { vwap, macd: { macdLine, signalLine, hist }, rsi, adx: { adx, pdi, ndi } };

            let sumTPV = 0, sumVol = 0;
            const k12 = 2 / 13, k26 = 2 / 27, k9 = 2 / 10;
            let ema12 = data[0].close, ema26 = data[0].close, emaSignal = 0;
            let gains = 0, losses = 0, avgGain = 0, avgLoss = 0;
            
            // Для ADX
            let trSum = 0, plusDmSum = 0, minusDmSum = 0;
            let avgTr = 0, avgPlusDm = 0, avgMinusDm = 0;

            for (let i = 0; i < data.length; i++) {
                const c = data[i];
                const prev = i > 0 ? data[i-1] : c;
                
                // VWAP
                sumTPV += ((c.high + c.low + c.close) / 3) * c.volume;
                sumVol += c.volume;
                vwap.push({ time: c.time, value: sumVol ? sumTPV / sumVol : c.close });

                // MACD
                ema12 = (c.close - ema12) * k12 + ema12;
                ema26 = (c.close - ema26) * k26 + ema26;
                const macdVal = ema12 - ema26;
                if (i === 0) emaSignal = macdVal;
                else emaSignal = (macdVal - emaSignal) * k9 + emaSignal;
                
                macdLine.push({ time: c.time, value: macdVal });
                signalLine.push({ time: c.time, value: emaSignal });
                hist.push({ time: c.time, value: macdVal - emaSignal, color: (macdVal - emaSignal) >= 0 ? 'rgba(8, 153, 129, 0.8)' : 'rgba(242, 54, 69, 0.8)' });

                // RSI (14)
                if (i > 0) {
                    const change = c.close - prev.close;
                    if (i <= 14) {
                        if (change > 0) gains += change; else losses -= change;
                        if (i === 14) { avgGain = gains/14; avgLoss = losses/14; }
                    } else {
                        avgGain = (avgGain * 13 + (change > 0 ? change : 0)) / 14;
                        avgLoss = (avgLoss * 13 + (change < 0 ? -change : 0)) / 14;
                    }
                }
                if (i >= 14) {
                    const rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
                    rsi.push({ time: c.time, value: 100 - (100 / (1 + rs)) });
                }

                // ADX (14)
                if (i > 0) {
                    const tr = Math.max(c.high - c.low, Math.abs(c.high - prev.close), Math.abs(c.low - prev.close));
                    const upMove = c.high - prev.high;
                    const downMove = prev.low - c.low;
                    const plusDm = (upMove > downMove && upMove > 0) ? upMove : 0;
                    const minusDm = (downMove > upMove && downMove > 0) ? downMove : 0;

                    if (i <= 14) {
                        trSum += tr; plusDmSum += plusDm; minusDmSum += minusDm;
                        if (i === 14) { avgTr = trSum/14; avgPlusDm = plusDmSum/14; avgMinusDm = minusDmSum/14; }
                    } else {
                        avgTr = avgTr - (avgTr/14) + tr;
                        avgPlusDm = avgPlusDm - (avgPlusDm/14) + plusDm;
                        avgMinusDm = avgMinusDm - (avgMinusDm/14) + minusDm;
                    }

                    if (i >= 14) {
                        const diPlus = avgTr > 0 ? (avgPlusDm / avgTr) * 100 : 0;
                        const diMinus = avgTr > 0 ? (avgMinusDm / avgTr) * 100 : 0;
                        const dx = (diPlus + diMinus) > 0 ? Math.abs(diPlus - diMinus) / (diPlus + diMinus) * 100 : 0;
                        
                        // Сглаживание ADX (упрощенное)
                        const currentAdx = adx.length === 0 ? dx : (adx[adx.length-1].value * 13 + dx) / 14;
                        
                        adx.push({ time: c.time, value: currentAdx });
                        pdi.push({ time: c.time, value: diPlus });
                        ndi.push({ time: c.time, value: diMinus });
                    }
                }
            }

            return { vwap, macd: { macdLine, signalLine, hist }, rsi, adx: { adx, pdi, ndi } };
        }

        function updateAllSeries() {
            series.candle.setData(candleHistory);
            series.volume.setData(candleHistory.map(c => ({
                time: c.time, value: c.volume, color: c.close >= c.open ? 'rgba(8, 153, 129, 0.5)' : 'rgba(242, 54, 69, 0.5)'
            })));

            const inds = calculateIndicators(candleHistory);
            
            series.vwap.setData(inds.vwap);
            series.macdLine.setData(inds.macd.macdLine);
            series.macdSignal.setData(inds.macd.signalLine);
            series.macdHist.setData(inds.macd.hist);
            series.rsi.setData(inds.rsi);
            series.adx.setData(inds.adx.adx);
            series.pdi.setData(inds.adx.pdi);
            series.ndi.setData(inds.adx.ndi);
        }

        // ==========================================
        // API ЗАПРОСЫ И ВЕБСОКЕТЫ
        // ==========================================
        async function loadHistory() {
            showLoading(true);
            try {
                const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${currentSymbol}&interval=${currentInterval}&limit=${MAX_CANDLES}`);
                const data = await res.json();
                
                candleHistory = data.map(k => ({
                    time: Math.floor(k[0] / 1000),
                    open: parseFloat(k[1]), high: parseFloat(k[2]),
                    low: parseFloat(k[3]), close: parseFloat(k[4]),
                    volume: parseFloat(k[5])
                }));

                if(candleHistory.length > 0) {
                    // Динамическая точность шкалы цены
                    const sample = candleHistory[candleHistory.length-1].close;
                    let prec = 2, minM = 0.01;
                    if (sample < 0.0001) { prec = 8; minM = 0.00000001; }
                    else if (sample < 0.01) { prec = 6; minM = 0.000001; }
                    else if (sample < 1) { prec = 4; minM = 0.0001; }
                    
                    series.candle.applyOptions({ priceFormat: { type: 'price', precision: prec, minMove: minM } });

                    updateAllSeries();
                    charts.main.timeScale().fitContent();
                    updateLegend(candleHistory[candleHistory.length - 1]);
                }
            } catch (err) {
                console.error("Ошибка загрузки истории", err);
            }
            showLoading(false);
        }

        function initKlineWS() {
            if (klineWs) { klineWs.onclose = null; klineWs.close(); }
            klineWs = new WebSocket(`wss://stream.binance.com:9443/ws/${currentSymbol.toLowerCase()}@kline_${currentInterval}`);
            
            klineWs.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                if (!msg.k) return;
                const k = msg.k;
                const candle = {
                    time: Math.floor(k.t / 1000), open: parseFloat(k.o), high: parseFloat(k.h),
                    low: parseFloat(k.l), close: parseFloat(k.c), volume: parseFloat(k.v)
                };

                const lastHist = candleHistory[candleHistory.length - 1];

                if (!lastHist || lastHist.time !== candle.time) {
                    candleHistory.push(candle);
                    if (candleHistory.length > MAX_CANDLES) candleHistory.shift();
                } else {
                    candleHistory[candleHistory.length - 1] = candle;
                }

                // Быстрое обновление графика и объемов
                series.candle.update(candle);
                series.volume.update({
                    time: candle.time, value: candle.volume, 
                    color: candle.close >= candle.open ? 'rgba(8, 153, 129, 0.5)' : 'rgba(242, 54, 69, 0.5)'
                });
                
                // Пересчет индикаторов (только для последних значений, чтобы не нагружать процессор)
                const inds = calculateIndicators(candleHistory);
                const l = candleHistory.length - 1;
                
                if (inds.vwap.length > 0) series.vwap.update(inds.vwap[inds.vwap.length-1]);
                if (inds.macd.macdLine.length > 0) {
                    series.macdLine.update(inds.macd.macdLine[inds.macd.macdLine.length-1]);
                    series.macdSignal.update(inds.macd.signalLine[inds.macd.signalLine.length-1]);
                    series.macdHist.update(inds.macd.hist[inds.macd.hist.length-1]);
                }
                if (inds.rsi.length > 0) series.rsi.update(inds.rsi[inds.rsi.length-1]);
                if (inds.adx.adx.length > 0) {
                    series.adx.update(inds.adx.adx[inds.adx.adx.length-1]);
                    series.pdi.update(inds.adx.pdi[inds.adx.pdi.length-1]);
                    series.ndi.update(inds.adx.ndi[inds.adx.ndi.length-1]);
                }

                updateLegend(candle);
            };

            klineWs.onclose = () => setTimeout(initKlineWS, 3000);
        }

        function initTickerWS() {
            if (tickerWs) { tickerWs.onclose = null; tickerWs.close(); }
            const allCoins = [...new Set([...defaultCoins, ...userCoins])];
            const streams = allCoins.map(c => `${c.toLowerCase()}@ticker`).join('/');
            
            tickerWs = new WebSocket(`wss://stream.binance.com:9443/ws/${streams}`);
            tickerWs.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (!data.s) return;
                
                const sym = data.s;
                const price = parseFloat(data.c);
                const pct = parseFloat(data.P);
                prices[sym] = price;

                if (sym === currentSymbol) {
                    const priceEl = document.getElementById('ticker-price');
                    priceEl.innerText = formatPrice(price);
                    priceEl.className = pct >= 0 ? 'price-up' : 'price-down';
                }
            };
            tickerWs.onclose = () => setTimeout(initTickerWS, 5000);
        }

        // ==========================================
        // ЛОГИКА ИНТЕРФЕЙСА
        // ==========================================
        async function changePair(symbol) {
            currentSymbol = symbol;
            document.getElementById('ticker-sym').innerText = symbol.replace('USDT', '');
            document.getElementById('ticker-price').innerText = prices[symbol] ? formatPrice(prices[symbol]) : '...';
            
            renderCoinList();
            initCharts();
            await loadHistory();
            initKlineWS();
        }

        async function changeInterval(interval, btn) {
            currentInterval = interval;
            document.querySelectorAll('.interval-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            initCharts();
            await loadHistory();
            initKlineWS();
        }

        // Старт
        renderCoinList();
        changePair(currentSymbol);
        initTickerWS();

    </script>
</body>
</html>
