<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Crypto Terminal Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root {
            --bg-dark: #080c10;
            --bg-panel: #12161f;
            --bg-hover: #1c2330;
            --border: #1f2937;
            --accent: #2962ff;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --up-color: #00e676;
            --down-color: #ff5252;
            --safe-top: env(safe-area-inset-top, 0px);
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            overscroll-behavior: none;
        }

        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        /* Хедер */
        header {
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            padding: 0 12px;
            padding-top: calc(6px + var(--safe-top));
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 44px;
            flex-shrink: 0;
            z-index: 10;
            box-sizing: content-box;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            font-weight: 900;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-main);
            white-space: nowrap;
        }
        .logo span {
            color: var(--accent);
        }

        .price-ticker {
            font-size: 0.85rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.03);
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            min-width: 150px;
            justify-content: center;
        }

        .price-up {
            color: var(--up-color);
        }
        .price-down {
            color: var(--down-color);
        }

        .btn-icon {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .btn-icon:active {
            background: var(--bg-hover);
        }
        .btn-icon.active {
            color: #ffd600;
        }
        .btn-icon svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* Панель контролов */
        .controls-panel {
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            background: var(--bg-dark);
            border-bottom: 1px solid var(--border);
        }

        .horizontal-scroll {
            display: flex;
            gap: 6px;
            padding: 6px 12px;
            overflow-x: auto;
            align-items: center;
            scrollbar-width: none;
            min-height: 40px;
        }
        .horizontal-scroll::-webkit-scrollbar {
            display: none;
        }

        .coin-btn,
        .interval-btn,
        .indicator-toggle {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
        }

        .coin-btn {
            padding: 5px 28px 5px 12px;
            position: relative;
            font-weight: 700;
        }
        .coin-btn.pinned {
            padding-right: 12px;
        }
        .coin-btn.active,
        .interval-btn.active,
        .indicator-toggle.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        .coin-btn:not(.pinned) {
            padding-right: 28px;
        }

        .btn-del {
            position: absolute;
            right: 4px;
            width: 18px;
            height: 18px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 400;
        }
        .coin-btn.active .btn-del {
            color: rgba(255, 255, 255, 0.7);
        }

        .interval-btn,
        .indicator-toggle {
            padding: 4px 10px;
            font-size: 0.7rem;
        }

        .btn-add {
            background: transparent;
            border: 1px dashed var(--text-muted);
            padding: 5px 14px;
            color: var(--text-muted);
            font-weight: 600;
            cursor: pointer;
        }

        /* Чарты */
        #charts-wrapper {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            background-color: var(--bg-dark);
            position: relative;
        }

        .chart-container {
            width: 100%;
            position: relative;
            background-color: var(--bg-dark);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        #main-chart {
            flex-grow: 1;
            min-height: 350px;
        }
        .indicator-chart {
            height: 160px;
        }

        .chart-legend {
            position: absolute;
            top: 8px;
            left: 12px;
            z-index: 5;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 5px;
            background: rgba(8, 12, 16, 0.85);
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .chart-title {
            font-size: 0.8rem;
            color: var(--text-main);
            font-weight: 700;
        }
        .chart-values {
            font-size: 0.75rem;
            display: flex;
            gap: 8px;
            font-variant-numeric: tabular-nums;
            color: var(--text-muted);
        }

        /* Индикатор загрузки */
        #loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(8, 12, 16, 0.92);
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-weight: 600;
            font-size: 0.9rem;
            transition: opacity 0.3s;
        }
        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(41, 98, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Тосты */
        #toast-container {
            position: fixed;
            top: calc(50px + var(--safe-top));
            right: 12px;
            left: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10000;
            pointer-events: none;
        }
        .toast {
            background: rgba(18, 22, 31, 0.96);
            border: 1px solid var(--border);
            border-left: 4px solid var(--accent);
            color: #fff;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
            animation: slideIn 0.25s ease forwards;
            pointer-events: auto;
        }
        .toast.alert-up {
            border-left-color: var(--up-color);
        }
        .toast.alert-down {
            border-left-color: var(--down-color);
        }
        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        @keyframes fadeOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <div class="logo">AMIGO<span>.ТЕРМИНАЛ</span></div>
            <div class="price-ticker" id="global-ticker">
                <span id="ticker-sym">BTC</span>
                <span id="ticker-price">...</span>
            </div>
        </div>
        <div>
            <button class="btn-icon" id="btn-alerts" title="Умные уведомления">
                <svg viewBox="0 0 24 24">
                    <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2zm-2 1H8v-6c0-2.48 1.51-4.5 4-4.5s4 2.02 4 4.5v6z"/>
                </svg>
            </button>
        </div>
    </header>

    <div class="controls-panel">
        <div class="horizontal-scroll" id="coin-list"></div>
        <div class="horizontal-scroll">
            <div id="interval-selector" style="display: flex; gap: 4px;">
                <button class="interval-btn" data-interval="1m">1m</button>
                <button class="interval-btn" data-interval="5m">5m</button>
                <button class="interval-btn active" data-interval="15m">15m</button>
                <button class="interval-btn" data-interval="30m">30m</button>
                <button class="interval-btn" data-interval="1h">1h</button>
                <button class="interval-btn" data-interval="4h">4h</button>
                <button class="interval-btn" data-interval="1d">1d</button>
                <button class="interval-btn" data-interval="1w">1w</button>
                <button class="interval-btn" data-interval="1M">1M</button>
            </div>
            <div style="width: 1px; background: var(--border); margin: 0 8px; height: 20px;"></div>
            <div id="indicator-selector" style="display: flex; gap: 4px;">
                <button class="indicator-toggle active" data-ind="VWAP">VWAP</button>
                <button class="indicator-toggle active" data-ind="MACD">MACD</button>
                <button class="indicator-toggle active" data-ind="RSI">RSI</button>
                <button class="indicator-toggle active" data-ind="ADX">ADX</button>
            </div>
        </div>
    </div>

    <div id="charts-wrapper">
        <div id="loading-overlay"><div class="spinner"></div>Загрузка истории...</div>

        <div id="main-chart" class="chart-container">
            <div class="chart-legend">
                <div class="chart-title" id="legend-title">BTCUSDT</div>
                <div class="chart-values" id="legend-values">
                    <div>O <span id="info-open">-</span></div>
                    <div>H <span id="info-high">-</span></div>
                    <div>L <span id="info-low">-</span></div>
                    <div>C <span id="info-close">-</span></div>
                    <div>V <span id="info-vol">-</span></div>
                </div>
            </div>
        </div>

        <div id="macd-chart" class="chart-container indicator-chart">
            <div class="chart-legend"><div class="chart-title">MACD (12, 26, 9)</div></div>
        </div>

        <div id="rsi-chart" class="chart-container indicator-chart">
            <div class="chart-legend"><div class="chart-title">RSI (14)</div></div>
        </div>

        <div id="adx-chart" class="chart-container indicator-chart">
            <div class="chart-legend"><div class="chart-title">ADX (14)</div></div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
    (function() {
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            tg.setHeaderColor('#12161f');
            tg.setBackgroundColor('#080c10');
        }

        console.log('🚀 Терминал Pro v4.0 запускается...');

        // ===================== КОНФИГУРАЦИЯ =====================
        const MAX_CANDLES = 1000;
        const MAX_TOTAL_COINS = 15;
        const STORAGE_KEY_COINS = 'termpro_user_coins';
        const STORAGE_KEY_ALERTS = 'termpro_alerts_enabled';
        const STORAGE_KEY_INDICATORS = 'termpro_indicator_visibility';

        const defaultCoins = ['BTCUSDT', 'ETHUSDT'];
        let userCoins = JSON.parse(localStorage.getItem(STORAGE_KEY_COINS)) || ['SOLUSDT', 'TONUSDT', 'DOGEUSDT'];
        let currentSymbol = 'BTCUSDT';
        let currentInterval = '15m';
        let alertsEnabled = localStorage.getItem(STORAGE_KEY_ALERTS) === 'true';

        let indicatorVisibility = {
            VWAP: true,
            MACD: true,
            RSI: true,
            ADX: true
        };
        const savedVisibility = localStorage.getItem(STORAGE_KEY_INDICATORS);
        if (savedVisibility) {
            try {
                const saved = JSON.parse(savedVisibility);
                indicatorVisibility = { ...indicatorVisibility, ...saved };
            } catch (e) {}
        }

        // ===================== ЦВЕТОВАЯ СХЕМА =====================
        const COLORS = {
            up: '#00e676',
            down: '#ff5252',
            bg: '#080c10',
            grid: '#1f2937',
            text: '#9ca3af',
            macdLine: '#2962ff',
            signalLine: '#ff9800',
            histUp: 'rgba(0, 230, 118, 0.5)',
            histDown: 'rgba(255, 82, 82, 0.5)',
            rsiLine: '#9c27b0',
            vwapLine: '#2962ff',
            adx: '#2962ff',
            pdi: '#00e676',
            ndi: '#ff5252'
        };

        // ===================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ =====================
        const charts = { main: null, macd: null, rsi: null, adx: null };
        const series = {};
        let candleHistory = [];
        let prices = {};

        let klineWs = null;
        let klineReconnectTimer = null;
        let klineReconnectDelay = 1000;
        const MAX_KL_RECONNECT_DELAY = 30000;

        let tickerWs = null;
        let tickerReconnectTimer = null;
        let tickerReconnectDelay = 1000;
        const MAX_TICK_RECONNECT_DELAY = 30000;

        let resizeObserver = null;
        let isSyncing = false;

        // ===================== УТИЛИТЫ =====================
        function formatPrice(price) {
            if (price < 0.0001) return price.toPrecision(4);
            if (price < 1) return price.toFixed(4);
            if (price < 50) return price.toFixed(3);
            return price.toFixed(2);
        }

        function showLoading(show) {
            document.getElementById('loading-overlay').classList.toggle('hidden', !show);
        }

        function getActiveCoins() {
            return [...new Set([...defaultCoins, ...userCoins])].slice(0, MAX_TOTAL_COINS);
        }

        // ===================== UI РЕНДЕР =====================
        function renderCoinList() {
            const container = document.getElementById('coin-list');
            if (!container) return;
            container.innerHTML = '';

            const allCoins = getActiveCoins();
            allCoins.forEach(coin => {
                const isPinned = defaultCoins.includes(coin);
                const btn = document.createElement('button');
                btn.className = `coin-btn ${coin === currentSymbol ? 'active' : ''} ${isPinned ? 'pinned' : ''}`;
                btn.textContent = coin.replace('USDT', '');

                if (!isPinned) {
                    const delBadge = document.createElement('span');
                    delBadge.className = 'btn-del';
                    delBadge.innerHTML = '×';
                    delBadge.onclick = (e) => {
                        e.stopPropagation();
                        removeCoin(coin);
                    };
                    btn.appendChild(delBadge);
                }

                btn.onclick = () => {
                    if (coin !== currentSymbol) changePair(coin);
                };
                container.appendChild(btn);
            });

            const addBtn = document.createElement('button');
            addBtn.className = 'coin-btn btn-add';
            addBtn.innerText = '+';
            addBtn.onclick = addNewCoin;
            container.appendChild(addBtn);
        }

        function addNewCoin() {
            let newCoin = prompt("Введите тикер монеты к USDT (например: XRP, ADA, PEPE):");
            if (!newCoin) return;
            newCoin = newCoin.toUpperCase().replace(/[^A-Z0-9]/g, '').trim();
            if (!newCoin) return;
            if (!newCoin.endsWith('USDT') && !newCoin.endsWith('BUSD')) {
                newCoin += 'USDT';
            }

            const allCoins = getActiveCoins();
            if (allCoins.length >= MAX_TOTAL_COINS) {
                showToast("Лимит", `Максимум ${MAX_TOTAL_COINS} монет`, 'alert-down');
                return;
            }

            if (!allCoins.includes(newCoin)) {
                userCoins.push(newCoin);
                localStorage.setItem(STORAGE_KEY_COINS, JSON.stringify(userCoins));
                reconnectTickerWebSocket();
                renderCoinList();
                showToast("Успешно", `${newCoin.replace('USDT', '')} добавлен`, 'info');
            } else {
                showToast("Инфо", "Монета уже добавлена", "info");
            }
        }

        function removeCoin(coin) {
            userCoins = userCoins.filter(c => c !== coin);
            localStorage.setItem(STORAGE_KEY_COINS, JSON.stringify(userCoins));
            sessionStorage.removeItem(`alerted_${coin}`);

            if (currentSymbol === coin) {
                changePair(defaultCoins[0]);
            } else {
                reconnectTickerWebSocket();
                renderCoinList();
            }
            showToast("Удалено", `${coin.replace('USDT', '')} извлечен`, 'info');
        }

        // ===================== УМНЫЕ АЛЕРТЫ =====================
        function toggleSmartAlerts() {
            alertsEnabled = !alertsEnabled;
            localStorage.setItem(STORAGE_KEY_ALERTS, alertsEnabled ? 'true' : 'false');
            document.getElementById('btn-alerts').classList.toggle('active', alertsEnabled);
            showToast(
                "Smart Alerts",
                alertsEnabled ? "Мониторинг ≥2% запущен" : "Мониторинг деактивирован",
                "info"
            );
        }

        function checkAndFireAlert(symbol, price, changePct) {
            if (Math.abs(changePct) < 2.0) return;
            const alertKey = `alerted_${symbol}`;
            const lastAlertTime = sessionStorage.getItem(alertKey);
            const now = Date.now();
            if (!lastAlertTime || (now - parseInt(lastAlertTime) > 15 * 60 * 1000)) {
                const dir = changePct > 0 ? "🚀 ПАМП" : "🩸 ДАМП";
                const type = changePct > 0 ? "alert-up" : "alert-down";
                showToast(
                    `${dir}: ${symbol.replace('USDT', '')}`,
                    `${price} (${changePct > 0 ? '+' : ''}${changePct.toFixed(2)}%)`,
                    type
                );
                sessionStorage.setItem(alertKey, now.toString());
            }
        }

        // ===================== ТОСТЫ =====================
        function showToast(title, message, type = '') {
            const container = document.getElementById('toast-container');
            if (!container) return;
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<div><strong>${title}</strong></div><div>${message}</div>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.25s ease-out forwards';
                setTimeout(() => toast.remove(), 250);
            }, 3500);
        }

        // ===================== ИНИЦИАЛИЗАЦИЯ ГРАФИКОВ =====================
        function destroyCharts() {
            if (resizeObserver) {
                resizeObserver.disconnect();
                resizeObserver = null;
            }
            Object.values(charts).forEach(c => { if (c) c.remove(); });
            charts.main = charts.macd = charts.rsi = charts.adx = null;
            Object.keys(series).forEach(key => delete series[key]);
        }

        function initCharts() {
            destroyCharts();

            const containers = {
                main: document.getElementById('main-chart'),
                macd: document.getElementById('macd-chart'),
                rsi: document.getElementById('rsi-chart'),
                adx: document.getElementById('adx-chart')
            };

            const commonOptions = {
                layout: { textColor: COLORS.text, background: { type: 'solid', color: COLORS.bg } },
                grid: { vertLines: { color: COLORS.grid }, horzLines: { color: COLORS.grid } },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal }
            };

            // Главный график
            charts.main = LightweightCharts.createChart(containers.main, {
                ...commonOptions,
                timeScale: { borderColor: COLORS.grid, timeVisible: true, rightOffset: 5 },
                rightPriceScale: {
                    borderColor: 'rgba(197, 203, 206, 0.4)',
                    scaleMargins: { top: 0.1, bottom: 0.25 }
                },
                handleScroll: {
                    vertTouchDrag: false,
                    horzTouchDrag: true,
                    mouseWheel: true
                },
                handleScale: {
                    axisPressedMouseMove: { time: true, price: true },
                    mouseWheel: true,
                    pinch: true
                }
            });

            series.candle = charts.main.addCandlestickSeries({
                upColor: COLORS.up,
                downColor: COLORS.down,
                borderVisible: false,
                wickUpColor: COLORS.up,
                wickDownColor: COLORS.down
            });

            // Шкала объемов
            charts.main.priceScale('volume').applyOptions({
                scaleMargins: { top: 0.8, bottom: 0 },
                visible: false
            });
            series.volume = charts.main.addHistogramSeries({
                priceScaleId: 'volume',
                priceFormat: { type: 'volume' }
            });

            series.vwap = charts.main.addLineSeries({
                color: COLORS.vwapLine,
                lineWidth: 1,
                crosshairMarkerVisible: false,
                lastValueVisible: false,
                priceLineVisible: false
            });

            // Индикаторные графики (без шкалы времени)
            const indOptions = {
                ...commonOptions,
                timeScale: { visible: false },
                handleScroll: {
                    vertTouchDrag: false,
                    horzTouchDrag: false,
                    mouseWheel: false,
                    pressedMouseMove: false
                },
                handleScale: {
                    axisPressedMouseMove: { time: false, price: false },
                    mouseWheel: false,
                    pinch: false
                }
            };

            // MACD
            charts.macd = LightweightCharts.createChart(containers.macd, indOptions);
            series.macdHist = charts.macd.addHistogramSeries({ priceScaleId: '' });
            series.macdLine = charts.macd.addLineSeries({
                color: COLORS.macdLine,
                lineWidth: 2,
                lastValueVisible: true,
                priceLineVisible: false
            });
            series.macdSignal = charts.macd.addLineSeries({
                color: COLORS.signalLine,
                lineWidth: 2,
                lastValueVisible: true,
                priceLineVisible: false
            });

            // RSI
            charts.rsi = LightweightCharts.createChart(containers.rsi, indOptions);
            series.rsi = charts.rsi.addLineSeries({
                color: COLORS.rsiLine,
                lineWidth: 2,
                lastValueVisible: true,
                priceLineVisible: false
            });
            series.rsi.createPriceLine({
                price: 70,
                color: 'rgba(255, 82, 82, 0.4)',
                lineWidth: 1,
                lineStyle: LightweightCharts.LineStyle.Dashed,
                axisLabelVisible: false
            });
            series.rsi.createPriceLine({
                price: 30,
                color: 'rgba(0, 230, 118, 0.4)',
                lineWidth: 1,
                lineStyle: LightweightCharts.LineStyle.Dashed,
                axisLabelVisible: false
            });

            // ADX
            charts.adx = LightweightCharts.createChart(containers.adx, indOptions);
            series.adx = charts.adx.addLineSeries({
                color: COLORS.adx,
                lineWidth: 2,
                lastValueVisible: true,
                priceLineVisible: false
            });
            series.pdi = charts.adx.addLineSeries({
                color: COLORS.pdi,
                lineWidth: 1,
                lastValueVisible: true,
                priceLineVisible: false
            });
            series.ndi = charts.adx.addLineSeries({
                color: COLORS.ndi,
                lineWidth: 1,
                lastValueVisible: true,
                priceLineVisible: false
            });

            // Жесткая синхронизация временных шкал
            syncTimeScales();

            // Синхронизация кроссхейра
            syncCrosshair();

            // Resize Observer с дебаунсом
            resizeObserver = new ResizeObserver(entries => {
                requestAnimationFrame(() => {
                    entries.forEach(entry => {
                        const { width, height } = entry.contentRect;
                        if (width > 0 && height > 0) {
                            if (entry.target.id === 'main-chart') charts.main.applyOptions({ width, height });
                            if (entry.target.id === 'macd-chart' && indicatorVisibility.MACD)
                                charts.macd.applyOptions({ width, height });
                            if (entry.target.id === 'rsi-chart' && indicatorVisibility.RSI)
                                charts.rsi.applyOptions({ width, height });
                            if (entry.target.id === 'adx-chart' && indicatorVisibility.ADX)
                                charts.adx.applyOptions({ width, height });
                        }
                    });
                });
            });
            Object.values(containers).forEach(c => resizeObserver.observe(c));

            applyIndicatorVisibility();
            console.log('✅ Графики инициализированы');
        }

        function syncTimeScales() {
            const linkedCharts = [charts.macd, charts.rsi, charts.adx].filter(Boolean);

            charts.main.timeScale().subscribeVisibleLogicalRangeChange(range => {
                if (isSyncing || !range) return;
                isSyncing = true;
                linkedCharts.forEach(chart => {
                    if (chart) chart.timeScale().setVisibleLogicalRange(range);
                });
                isSyncing = false;
            });
        }

        function syncCrosshair() {
            const linkedCharts = [charts.macd, charts.rsi, charts.adx].filter(Boolean);

            charts.main.subscribeCrosshairMove(param => {
                if (!param || !param.time) {
                    linkedCharts.forEach(c => c.clearCrosshairPosition());
                    updateLegend(null);
                    return;
                }

                const dataPoint = param.seriesData.get(series.candle);
                if (dataPoint) updateLegend(dataPoint);

                linkedCharts.forEach(c => {
                    c.setCrosshairPosition(0, param.time, series.candle);
                });
            });

            linkedCharts.forEach(chart => {
                chart.subscribeCrosshairMove(() => {});
            });
        }

        function updateLegend(data) {
            const els = {
                open: document.getElementById('info-open'),
                high: document.getElementById('info-high'),
                low: document.getElementById('info-low'),
                close: document.getElementById('info-close'),
                vol: document.getElementById('info-vol')
            };

            if (!data) {
                Object.values(els).forEach(el => { if (el) el.textContent = '-'; });
                return;
            }

            const isUp = data.close >= data.open;
            const color = isUp ? COLORS.up : COLORS.down;

            document.getElementById('legend-title').innerText =
                `${currentSymbol.replace('USDT', '')} • ${currentInterval}`;

            els.open.textContent = formatPrice(data.open);
            els.high.textContent = formatPrice(data.high);
            els.low.textContent = formatPrice(data.low);
            els.close.textContent = formatPrice(data.close);
            els.vol.textContent = data.volume ? formatPrice(data.volume) : '0';

            Object.values(els).forEach(el => el.style.color = color);
        }

        function applyIndicatorVisibility() {
            const macdEl = document.getElementById('macd-chart');
            const rsiEl = document.getElementById('rsi-chart');
            const adxEl = document.getElementById('adx-chart');

            if (macdEl) macdEl.style.display = indicatorVisibility.MACD ? 'block' : 'none';
            if (rsiEl) rsiEl.style.display = indicatorVisibility.RSI ? 'block' : 'none';
            if (adxEl) adxEl.style.display = indicatorVisibility.ADX ? 'block' : 'none';

            if (charts.macd && indicatorVisibility.MACD) charts.macd.applyOptions({ width: macdEl.clientWidth, height: 160 });
            if (charts.rsi && indicatorVisibility.RSI) charts.rsi.applyOptions({ width: rsiEl.clientWidth, height: 160 });
            if (charts.adx && indicatorVisibility.ADX) charts.adx.applyOptions({ width: adxEl.clientWidth, height: 160 });
        }

        // ===================== МАТЕМАТИКА ИНДИКАТОРОВ (ИНКРЕМЕНТАЛЬНЫЙ АЛГОРИТМ) =====================
        function calculateIndicators(data) {
            const vwap = [],
                macdLine = [],
                signalLine = [],
                hist = [],
                rsi = [];
            const adx = [],
                pdi = [],
                ndi = [];

            if (data.length === 0) return { vwap, macd: { macdLine, signalLine, hist }, rsi, adx: { adx, pdi, ndi } };

            let sumTPV = 0,
                sumVol = 0;
            const k12 = 2 / 13,
                k26 = 2 / 27,
                k9 = 2 / 10;
            let ema12 = data[0].close,
                ema26 = data[0].close,
                emaSignal = 0;
            let gains = 0,
                losses = 0,
                avgGain = 0,
                avgLoss = 0;

            let trSum = 0,
                plusDmSum = 0,
                minusDmSum = 0;
            let avgTr = 0,
                avgPlusDm = 0,
                avgMinusDm = 0;

            for (let i = 0; i < data.length; i++) {
                const c = data[i];
                const prev = i > 0 ? data[i - 1] : c;

                // VWAP
                sumTPV += ((c.high + c.low + c.close) / 3) * c.volume;
                sumVol += c.volume;
                vwap.push({ time: c.time, value: sumVol ? sumTPV / sumVol : c.close });

                // MACD
                ema12 = (c.close - ema12) * k12 + ema12;
                ema26 = (c.close - ema26) * k26 + ema26;
                const macdVal = ema12 - ema26;
                emaSignal = (i === 0) ? macdVal : (macdVal - emaSignal) * k9 + emaSignal;

                macdLine.push({ time: c.time, value: macdVal });
                signalLine.push({ time: c.time, value: emaSignal });
                hist.push({
                    time: c.time,
                    value: macdVal - emaSignal,
                    color: (macdVal - emaSignal) >= 0 ? COLORS.histUp : COLORS.histDown
                });

                // RSI
                if (i > 0) {
                    const change = c.close - prev.close;
                    if (i <= 14) {
                        if (change > 0) gains += change;
                        else losses -= change;
                        if (i === 14) {
                            avgGain = gains / 14;
                            avgLoss = losses / 14;
                        }
                    } else {
                        avgGain = (avgGain * 13 + (change > 0 ? change : 0)) / 14;
                        avgLoss = (avgLoss * 13 + (change < 0 ? -change : 0)) / 14;
                    }
                }
                if (i >= 14) {
                    const rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
                    rsi.push({ time: c.time, value: 100 - (100 / (1 + rs)) });
                }

                // ADX
                if (i > 0) {
                    const tr = Math.max(c.high - c.low, Math.abs(c.high - prev.close), Math.abs(c.low - prev.close));
                    const upMove = c.high - prev.high;
                    const downMove = prev.low - c.low;
                    const plusDm = (upMove > downMove && upMove > 0) ? upMove : 0;
                    const minusDm = (downMove > upMove && downMove > 0) ? downMove : 0;

                    if (i <= 14) {
                        trSum += tr;
                        plusDmSum += plusDm;
                        minusDmSum += minusDm;
                        if (i === 14) {
                            avgTr = trSum / 14;
                            avgPlusDm = plusDmSum / 14;
                            avgMinusDm = minusDmSum / 14;
                        }
                    } else {
                        avgTr = avgTr - (avgTr / 14) + tr;
                        avgPlusDm = avgPlusDm - (avgPlusDm / 14) + plusDm;
                        avgMinusDm = avgMinusDm - (avgMinusDm / 14) + minusDm;
                    }

                    if (i >= 14) {
                        const diPlus = avgTr > 0 ? (avgPlusDm / avgTr) * 100 : 0;
                        const diMinus = avgTr > 0 ? (avgMinusDm / avgTr) * 100 : 0;
                        const dx = (diPlus + diMinus) > 0 ? Math.abs(diPlus - diMinus) / (diPlus + diMinus) * 100 : 0;
                        const currentAdx = adx.length === 0 ? dx : (adx[adx.length - 1].value * 13 + dx) / 14;

                        adx.push({ time: c.time, value: currentAdx });
                        pdi.push({ time: c.time, value: diPlus });
                        ndi.push({ time: c.time, value: diMinus });
                    }
                }
            }

            return { vwap, macd: { macdLine, signalLine, hist }, rsi, adx: { adx, pdi, ndi } };
        }

        function updateAllSeries() {
            series.candle.setData(candleHistory);
            series.volume.setData(candleHistory.map(c => ({
                time: c.time,
                value: c.volume,
                color: c.close >= c.open ? COLORS.histUp : COLORS.histDown
            })));

            const inds = calculateIndicators(candleHistory);

            series.vwap.setData(inds.vwap);
            series.macdLine.setData(inds.macd.macdLine);
            series.macdSignal.setData(inds.macd.signalLine);
            series.macdHist.setData(inds.macd.hist);
            series.rsi.setData(inds.rsi);
            series.adx.setData(inds.adx.adx);
            series.pdi.setData(inds.adx.pdi);
            series.ndi.setData(inds.adx.ndi);
        }

        // ===================== ЗАГРУЗКА ИСТОРИИ =====================
        async function loadHistory() {
            showLoading(true);
            try {
                const res = await fetch(
                    `https://api.binance.com/api/v3/klines?symbol=${currentSymbol}&interval=${currentInterval}&limit=${MAX_CANDLES}`
                );
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();

                candleHistory = data.map(k => ({
                    time: Math.floor(k[0] / 1000),
                    open: parseFloat(k[1]),
                    high: parseFloat(k[2]),
                    low: parseFloat(k[3]),
                    close: parseFloat(k[4]),
                    volume: parseFloat(k[5])
                }));

                if (candleHistory.length > 0) {
                    const sample = candleHistory[candleHistory.length - 1].close;
                    let prec = 2,
                        minM = 0.01;
                    if (sample < 0.0001) { prec = 8;
                        minM = 0.00000001; } else if (sample < 0.01) { prec = 6;
                        minM = 0.000001; } else if (sample < 1) { prec = 4;
                        minM = 0.0001; }

                    series.candle.applyOptions({
                        priceFormat: { type: 'price', precision: prec, minMove: minM }
                    });

                    updateAllSeries();
                    charts.main.timeScale().fitContent();

                    const range = charts.main.timeScale().getVisibleLogicalRange();
                    if (range) {
                        [charts.macd, charts.rsi, charts.adx].forEach(chart => {
                            if (chart) chart.timeScale().setVisibleLogicalRange(range);
                        });
                    }

                    updateLegend(candleHistory[candleHistory.length - 1]);
                }
                console.log('✅ История загружена');
            } catch (err) {
                console.error('❌ Ошибка загрузки истории:', err);
                showToast('Ошибка', 'Не удалось загрузить историю', 'alert-down');
            }
            showLoading(false);
        }

        // ===================== WEB SOCKET =====================
        function initKlineWS() {
            if (klineWs) {
                klineWs.onclose = null;
                klineWs.close();
                klineWs = null;
            }

            const wsUrl =
                `wss://stream.binance.com:9443/ws/${currentSymbol.toLowerCase()}@kline_${currentInterval}`;
            console.log(`🔌 Kline WS: ${wsUrl}`);
            klineWs = new WebSocket(wsUrl);

            klineWs.onopen = () => {
                console.log('✅ Kline WS открыт');
                klineReconnectDelay = 1000;
            };

            klineWs.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    if (!msg.k) return;
                    const k = msg.k;
                    const candle = {
                        time: Math.floor(k.t / 1000),
                        open: parseFloat(k.o),
                        high: parseFloat(k.h),
                        low: parseFloat(k.l),
                        close: parseFloat(k.c),
                        volume: parseFloat(k.v)
                    };

                    // Обновление истории
                    const lastHist = candleHistory[candleHistory.length - 1];
                    if (!lastHist || lastHist.time !== candle.time) {
                        candleHistory.push(candle);
                        if (candleHistory.length > MAX_CANDLES) candleHistory.shift();
                    } else {
                        candleHistory[candleHistory.length - 1] = candle;
                    }

                    // Быстрое обновление основного графика
                    series.candle.update(candle);
                    series.volume.update({
                        time: candle.time,
                        value: candle.volume,
                        color: candle.close >= candle.open ? COLORS.histUp : COLORS.histDown
                    });

                    // Инкрементальное обновление индикаторов
                    const inds = calculateIndicators(candleHistory);
                    const l = candleHistory.length - 1;

                    if (inds.vwap.length > 0) series.vwap.update(inds.vwap[inds.vwap.length - 1]);
                    if (inds.macd.macdLine.length > 0) {
                        series.macdLine.update(inds.macd.macdLine[inds.macd.macdLine.length - 1]);
                        series.macdSignal.update(inds.macd.signalLine[inds.macd.signalLine.length - 1]);
                        series.macdHist.update(inds.macd.hist[inds.macd.hist.length - 1]);
                    }
                    if (inds.rsi.length > 0) series.rsi.update(inds.rsi[inds.rsi.length - 1]);
                    if (inds.adx.adx.length > 0) {
                        series.adx.update(inds.adx.adx[inds.adx.adx.length - 1]);
                        series.pdi.update(inds.adx.pdi[inds.adx.pdi.length - 1]);
                        series.ndi.update(inds.adx.ndi[inds.adx.ndi.length - 1]);
                    }
                } catch (e) {
                    console.error('Kline parse error', e);
                }
            };

            klineWs.onclose = () => {
                console.warn('Kline WS закрыт, переподключение...');
                scheduleKlineReconnect();
            };

            klineWs.onerror = (err) => console.error('Kline WS ошибка', err);
        }

        function scheduleKlineReconnect() {
            if (klineReconnectTimer) clearTimeout(klineReconnectTimer);
            klineReconnectTimer = setTimeout(() => {
                initKlineWS();
            }, klineReconnectDelay);
            klineReconnectDelay = Math.min(klineReconnectDelay * 2, MAX_KL_RECONNECT_DELAY);
        }

        function initTickerWS() {
            if (tickerWs) {
                tickerWs.onclose = null;
                tickerWs.close();
                tickerWs = null;
            }

            const allCoins = getActiveCoins();
            if (!allCoins.length) return;

            const streams = allCoins.map(c => `${c.toLowerCase()}@ticker`).join('/');
            const wsUrl = `wss://stream.binance.com:9443/ws/${streams}`;
            console.log(`🔌 Ticker WS: ${wsUrl}`);
            tickerWs = new WebSocket(wsUrl);

            tickerWs.onopen = () => {
                console.log('✅ Ticker WS открыт');
                tickerReconnectDelay = 1000;
            };

            tickerWs.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (!data || !data.s) return;

                    const sym = data.s;
                    const price = parseFloat(data.c);
                    const pct = parseFloat(data.P);
                    prices[sym] = price;

                    if (sym === currentSymbol) {
                        const priceEl = document.getElementById('ticker-price');
                        priceEl.innerText = formatPrice(price);
                        priceEl.className = pct >= 0 ? 'price-up' : 'price-down';
                    }

                    if (alertsEnabled) checkAndFireAlert(sym, formatPrice(price), pct);
                } catch (e) {
                    console.error('Ticker parse error', e);
                }
            };

            tickerWs.onclose = () => {
                console.warn('Ticker WS закрыт, переподключение...');
                scheduleTickerReconnect();
            };

            tickerWs.onerror = (err) => console.error('Ticker WS ошибка', err);
        }

        function scheduleTickerReconnect() {
            if (tickerReconnectTimer) clearTimeout(tickerReconnectTimer);
            tickerReconnectTimer = setTimeout(() => {
                initTickerWS();
            }, tickerReconnectDelay);
            tickerReconnectDelay = Math.min(tickerReconnectDelay * 2, MAX_TICK_RECONNECT_DELAY);
        }

        function reconnectTickerWebSocket() {
            initTickerWS();
        }

        // ===================== СМЕНА ПАРЫ / ИНТЕРВАЛА =====================
        async function changePair(symbol) {
            if (symbol === currentSymbol) return;
            console.log(`🔄 Смена на ${symbol}`);
            currentSymbol = symbol;

            document.getElementById('ticker-sym').innerText = symbol.replace('USDT', '');
            const cachedPrice = prices[symbol];
            const priceEl = document.getElementById('ticker-price');
            priceEl.innerText = cachedPrice ? formatPrice(cachedPrice) : '...';
            priceEl.className = '';

            renderCoinList();
            initCharts();
            await loadHistory();
            initKlineWS();
        }

        async function changeInterval(interval) {
            if (interval === currentInterval) return;
            console.log(`⏱ Смена интервала на ${interval}`);
            currentInterval = interval;

            document.querySelectorAll('#interval-selector .interval-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.interval === interval);
            });

            initCharts();
            await loadHistory();
            initKlineWS();
        }

        // ===================== ИНИЦИАЛИЗАЦИЯ UI =====================
        function initUI() {
            document.getElementById('btn-alerts').classList.toggle('active', alertsEnabled);

            document.querySelectorAll('#interval-selector .interval-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const interval = btn.dataset.interval;
                    if (interval !== currentInterval) changeInterval(interval);
                });
            });

            document.querySelectorAll('#indicator-selector .indicator-toggle').forEach(btn => {
                const ind = btn.dataset.ind;
                btn.classList.toggle('active', indicatorVisibility[ind]);
                btn.addEventListener('click', () => {
                    indicatorVisibility[ind] = !indicatorVisibility[ind];
                    btn.classList.toggle('active', indicatorVisibility[ind]);
                    localStorage.setItem(STORAGE_KEY_INDICATORS, JSON.stringify(indicatorVisibility));
                    applyIndicatorVisibility();
                });
            });

            document.getElementById('btn-alerts').onclick = toggleSmartAlerts;
            renderCoinList();
        }

        // ===================== ОЧИСТКА =====================
        window.addEventListener('beforeunload', () => {
            if (klineWs) { klineWs.onclose = null;
                klineWs.close(); }
            if (tickerWs) { tickerWs.onclose = null;
                tickerWs.close(); }
            if (klineReconnectTimer) clearTimeout(klineReconnectTimer);
            if (tickerReconnectTimer) clearTimeout(tickerReconnectTimer);
        });

        // ===================== ЗАПУСК =====================
        initUI();
        initCharts();
        loadHistory().then(() => {
            initKlineWS();
        });
        initTickerWS();
    })();
    </script>
