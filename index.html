<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Crypto Terminal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- ВАЖНО: версия 4.1.3 зафиксирована жёстко -->
    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root {
            --bg-dark: #080c10;
            --bg-panel: #12161f;
            --bg-btn-hover: #1c2330;
            --border: #1f2937;
            --accent: #2962ff;
            --accent-hover: #1546d2;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --up-color: #00e676;
            --down-color: #ff5252;
            --panel-height: 36px;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            overscroll-behavior: none;
        }

        header {
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            padding: 0 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: var(--panel-height);
            flex-shrink: 0;
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            font-weight: 800;
            font-size: 0.8rem;
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }
        .logo span { color: var(--accent); }

        .price-ticker {
            font-size: 0.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.03);
            padding: 3px 8px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .price-up { color: var(--up-color); }
        .price-down { color: var(--down-color); }

        .btn-icon {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-icon:active { background: var(--bg-btn-hover); }
        .btn-icon svg { width: 16px; height: 16px; fill: currentColor; transition: transform 0.2s; }
        .btn-icon:active svg { transform: scale(0.9); }
        .btn-icon.active { color: #ffd600; }

        .crypto-selector {
            display: flex;
            gap: 8px;
            padding: 0 12px;
            background: #0b0f17;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            height: 40px;
            align-items: center;
            flex-shrink: 0;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .crypto-selector::-webkit-scrollbar { display: none; }

        .coin-btn {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 5px 28px 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 700;
            white-space: nowrap;
            position: relative;
            display: inline-flex;
            align-items: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
        }

        .coin-btn.pinned {
            padding-right: 12px;
        }

        .coin-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 2px 8px rgba(33, 150, 243, 0.3);
        }

        .coin-btn .btn-del {
            position: absolute;
            right: 4px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--text-muted);
            transition: all 0.15s;
            z-index: 2;
        }
        .coin-btn.active .btn-del { color: rgba(255,255,255,0.7); }
        .coin-btn .btn-del:active { background: rgba(255, 61, 0, 0.2); color: var(--down-color); }

        .btn-add {
            background: transparent;
            border: 1px dashed var(--text-muted);
            padding: 5px 14px;
            color: var(--text-muted);
            font-weight: 600;
        }
        .btn-add:active {
            background: rgba(255,255,255,0.03);
        }

        #chart-container {
            width: 100%;
            flex-grow: 1;
            position: relative;
            background-color: var(--bg-dark);
            min-height: 200px;
        }

        #toast-container {
            position: fixed;
            top: 50px;
            right: 12px;
            left: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10000;
            pointer-events: none;
        }

        .toast {
            background: rgba(18, 22, 31, 0.96);
            border: 1px solid var(--border);
            border-left: 4px solid var(--accent);
            color: #fff;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            animation: slideIn 0.25s cubic-bezier(0, 0, 0.2, 1) forwards;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
        }

        .toast.alert-up { border-left-color: var(--up-color); }
        .toast.alert-down { border-left-color: var(--down-color); }
        .toast-title { font-weight: 700; margin-bottom: 3px; display: flex; justify-content: space-between; }

        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0; transform: scale(0.95); }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <div class="logo">AMIGO<span>.ТЕРМИНАЛ</span></div>
            <div class="price-ticker" id="global-ticker">
                <span id="ticker-sym">BTC</span>&nbsp;<span id="ticker-price">...</span>
            </div>
        </div>
        <div>
            <button class="btn-icon" id="btn-alerts" onclick="toggleSmartAlerts()" title="Умные уведомления">
                <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2zm-2 1H8v-6c0-2.48 1.51-4.5 4-4.5s4 2.02 4 4.5v6z"/></svg>
            </button>
        </div>
    </header>

    <div class="crypto-selector" id="coin-list"></div>

    <div id="chart-container"></div>
    <div id="toast-container"></div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        console.log('🚀 Терминал запускается...');
        console.log('LightweightCharts загружен:', typeof LightweightCharts !== 'undefined');
        if (typeof LightweightCharts !== 'undefined') {
            console.log('Версия:', LightweightCharts.version || 'неизвестна');
        }

        const defaultCoins = ['BTCUSDT', 'ETHUSDT'];
        let userCoins = JSON.parse(localStorage.getItem('amigo_user_coins')) || ['SOLUSDT', 'TONUSDT', 'DOGEUSDT'];
        const MAX_TOTAL_COINS = 15; 
        
        let currentSymbol = 'BTCUSDT';
        let chart = null;
        let candlestickSeries = null;
        let smaSeries = null;
        let candleHistory = [];
        let klineWs = null;
        let tickerWs = null;
        let prices = {}; 
        let alertsEnabled = localStorage.getItem('amigo_alerts_enabled') === 'true';
        const SMA_PERIOD = 9;
        const CHART_INTERVAL = '15m';

        document.getElementById('btn-alerts').classList.toggle('active', alertsEnabled);

        function renderCoinList() {
            const container = document.getElementById('coin-list');
            if (!container) return;
            container.innerHTML = '';

            const allCoins = [...new Set([...defaultCoins, ...userCoins])].slice(0, MAX_TOTAL_COINS);

            allCoins.forEach(coin => {
                const isPinned = defaultCoins.includes(coin);
                const btn = document.createElement('button');
                btn.className = `coin-btn ${coin === currentSymbol ? 'active' : ''} ${isPinned ? 'pinned' : ''}`;
                
                const cleanName = coin.replace('USDT', '');
                btn.insertAdjacentText('beforeend', cleanName);

                if (!isPinned) {
                    const delBadge = document.createElement('span');
                    delBadge.className = 'btn-del';
                    delBadge.innerHTML = '×';
                    delBadge.onclick = (e) => {
                        e.stopPropagation();
                        removeCoin(coin);
                    };
                    btn.appendChild(delBadge);
                }

                btn.onclick = () => {
                    if (coin !== currentSymbol) {
                        changePair(coin, btn);
                    }
                };
                
                container.appendChild(btn);
            });

            const addBtn = document.createElement('button');
            addBtn.className = 'coin-btn btn-add';
            addBtn.innerText = '+';
            addBtn.onclick = addNewCoin;
            container.appendChild(addBtn);
        }

        function initChart() {
            const container = document.getElementById('chart-container');
            if (!container) {
                console.error('❌ Контейнер chart-container не найден');
                return;
            }
            
            console.log('📊 Инициализация графика...');
            console.log('Размеры контейнера:', container.clientWidth, 'x', container.clientHeight);
            
            container.innerHTML = '';

            if (typeof LightweightCharts === 'undefined') {
                console.error('❌ LightweightCharts не загружен!');
                showToast('Ошибка', 'Библиотека графиков не загрузилась', 'alert-down');
                return;
            }

            try {
                chart = LightweightCharts.createChart(container, {
                    width: container.clientWidth,
                    height: container.clientHeight,
                    layout: {
                        textColor: '#d1d4dc',
                        background: { type: 'solid', color: '#080c10' },
                    },
                    grid: {
                        vertLines: { color: 'rgba(42, 46, 57, 0.4)' },
                        horzLines: { color: 'rgba(42, 46, 57, 0.4)' },
                    },
                    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                    rightPriceScale: { borderColor: 'rgba(197, 203, 206, 0.4)' },
                    timeScale: {
                        borderColor: 'rgba(197, 203, 206, 0.4)',
                        timeVisible: true,
                        secondsVisible: false,
                    },
                });

                console.log('✅ График создан');

                candlestickSeries = chart.addCandlestickSeries({
                    upColor: '#00e676', downColor: '#ff5252',
                    borderVisible: false,
                    wickUpColor: '#00e676', wickDownColor: '#ff5252'
                });

                smaSeries = chart.addLineSeries({
                    color: '#ff9800',
                    lineWidth: 2,
                    title: `SMA ${SMA_PERIOD}`
                });

                console.log('✅ Серии добавлены');

                const resizeObserver = new ResizeObserver(entries => {
                    const { width, height } = entries[0].contentRect;
                    if (width > 0 && height > 0) {
                        chart.resize(width, height);
                        console.log('🔄 Ресайз:', width, 'x', height);
                    }
                });
                resizeObserver.observe(container);
            } catch (err) {
                console.error('❌ Ошибка создания графика:', err);
                showToast('Ошибка', 'Не удалось создать график: ' + err.message, 'alert-down');
            }
        }

        function calculateSMA(data, period) {
            if (data.length < period) return null;
            const slice = data.slice(-period);
            const sum = slice.reduce((acc, c) => acc + c.close, 0);
            return sum / period;
        }

        function buildSmaSeries(history) {
            const result = [];
            for (let i = SMA_PERIOD - 1; i < history.length; i++) {
                const slice = history.slice(i - SMA_PERIOD + 1, i + 1);
                const sum = slice.reduce((a, c) => a + c.close, 0);
                result.push({ time: history[i].time, value: sum / SMA_PERIOD });
            }
            return result;
        }

        async function loadChartHistory(symbol) {
            console.log(`📥 Загрузка истории для ${symbol}...`);
            
            try {
                const url = `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${CHART_INTERVAL}&limit=300`;
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                
                console.log(`✅ Получено свечей: ${data.length}`);

                candleHistory = data.map(k => ({
                    time: Math.floor(k[0] / 1000),
                    open: parseFloat(k[1]),
                    high: parseFloat(k[2]),
                    low: parseFloat(k[3]),
                    close: parseFloat(k[4])
                }));

                candlestickSeries.setData(candleHistory);
                smaSeries.setData(buildSmaSeries(candleHistory));
                chart.timeScale().fitContent();

                console.log(`✅ История отрисована`);
                return true;
            } catch (err) {
                console.error('❌ Ошибка загрузки истории:', err);
                showToast('Ошибка', 'Не удалось загрузить историю', 'alert-down');
                return false;
            }
        }

        function initKlineWebSocket(symbol) {
            if (klineWs) {
                klineWs.onclose = null;
                klineWs.close();
            }

            const intervalMap = { '1m': '1m', '5m': '5m', '15m': '15m', '1h': '1h', '4h': '4h', '1d': '1d' };
            const wsInterval = intervalMap[CHART_INTERVAL] || '15m';
            const socketUrl = `wss://stream.binance.com:9443/ws/${symbol.toLowerCase()}@kline_${wsInterval}`;
            
            console.log(`🔌 Kline WS: ${socketUrl}`);
            
            klineWs = new WebSocket(socketUrl);

            klineWs.onopen = () => console.log('✅ Kline WS подключен');

            klineWs.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    const k = msg.k;
                    if (!k) return;

                    const candle = {
                        time: Math.floor(k.t / 1000),
                        open: parseFloat(k.o),
                        high: parseFloat(k.h),
                        low: parseFloat(k.l),
                        close: parseFloat(k.c)
                    };

                    candlestickSeries.update(candle);

                    const lastHist = candleHistory[candleHistory.length - 1];
                    if (!lastHist || lastHist.time !== candle.time) {
                        candleHistory.push(candle);
                        if (candleHistory.length > 500) candleHistory.shift();
                    } else {
                        candleHistory[candleHistory.length - 1] = candle;
                    }

                    const smaValue = calculateSMA(candleHistory, SMA_PERIOD);
                    if (smaValue !== null) {
                        smaSeries.update({ time: candle.time, value: smaValue });
                    }
                } catch (e) {
                    console.error('Ошибка парсинга kline:', e);
                }
            };

            klineWs.onclose = () => {
                setTimeout(() => {
                    if (currentSymbol === symbol) {
                        initKlineWebSocket(symbol);
                    }
                }, 3000);
            };

            klineWs.onerror = (err) => console.error('❌ Kline WS error', err);
        }

        function initTickerWebSocket(coins) {
            if (tickerWs && tickerWs.readyState !== WebSocket.CLOSED) {
                return; // Уже работает
            }
            
            if (tickerWs) {
                tickerWs.onclose = null;
                tickerWs.close();
            }
            
            const streams = coins.map(c => `${c.toLowerCase()}@ticker`).join('/');
            tickerWs = new WebSocket(`wss://stream.binance.com:9443/ws/${streams}`);

            tickerWs.onopen = () => console.log('✅ Ticker WS подключен');

            tickerWs.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (!data || !data.s) return;

                    const symbol = data.s;
                    const rawPrice = parseFloat(data.c);
                    const price = rawPrice.toFixed(rawPrice < 1 ? 4 : (rawPrice < 20 ? 3 : 2));
                    const priceChangePercent = parseFloat(data.P); 

                    prices[symbol] = price;

                    if (symbol === currentSymbol) {
                        const priceEl = document.getElementById('ticker-price');
                        if (priceEl) {
                            priceEl.innerText = price;
                            priceEl.className = priceChangePercent >= 0 ? 'price-up' : 'price-down';
                        }
                    }

                    if (alertsEnabled) {
                        checkAndFireAlert(symbol, price, priceChangePercent);
                    }
                } catch (e) {
                    console.error("WS parsing error:", e);
                }
            };

            tickerWs.onclose = () => {
                setTimeout(() => {
                    const activeCoins = [...new Set([...defaultCoins, ...userCoins])].slice(0, MAX_TOTAL_COINS);
                    initTickerWebSocket(activeCoins);
                }, 5000);
            };

            tickerWs.onerror = (err) => console.error("Ticker WS error", err);
        }

        async function changePair(symbol, btnElement) {
            console.log(`\n🔄 Смена пары на ${symbol}`);
            
            currentSymbol = symbol;
            
            document.querySelectorAll('.coin-btn').forEach(b => b.classList.remove('active'));
            if (btnElement) {
                btnElement.classList.add('active');
            } else {
                renderCoinList();
            }

            const displaySym = symbol.replace('USDT', '');
            document.getElementById('ticker-sym').innerText = displaySym;
            
            const cachedPrice = prices[symbol];
            const priceEl = document.getElementById('ticker-price');
            priceEl.innerText = cachedPrice ? cachedPrice : '...';
            priceEl.className = ''; 

            initChart();
            await loadChartHistory(symbol);
            initKlineWebSocket(symbol);
            
            // Ticker WS — только при первом запуске
            const allCoins = [...new Set([...defaultCoins, ...userCoins])].slice(0, MAX_TOTAL_COINS);
            initTickerWebSocket(allCoins);
            
            if (tg?.HapticFeedback) {
                tg.HapticFeedback.selectionChanged();
            }
        }

        function addNewCoin() {
            let newCoin = prompt("Введите тикер монеты к USDT (например: XRP, ADA, PEPE):");
            if (!newCoin) return;
            
            newCoin = newCoin.toUpperCase().replace(/[^A-Z0-9]/g, '').trim();
            if (!newCoin) return;
            
            if (!newCoin.endsWith('USDT') && !newCoin.endsWith('BUSD')) {
                newCoin += 'USDT';
            }

            const allCoins = [...new Set([...defaultCoins, ...userCoins])];
            if (allCoins.length >= MAX_TOTAL_COINS) {
                showToast("Лимит", `Максимум ${MAX_TOTAL_COINS} монет.`, 'alert-down');
                return;
            }

            if (!allCoins.includes(newCoin)) {
                userCoins.push(newCoin);
                localStorage.setItem('amigo_user_coins', JSON.stringify(userCoins));
                renderCoinList();
                showToast("Успешно", `${newCoin.replace('USDT','')} добавлен`, 'info');
                if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            } else {
                showToast("Инфо", "Монета уже добавлена", "info");
            }
        }

        function removeCoin(coin) {
            userCoins = userCoins.filter(c => c !== coin);
            localStorage.setItem('amigo_user_coins', JSON.stringify(userCoins));
            
            const alertKey = `alerted_${coin}`;
            sessionStorage.removeItem(alertKey);

            if (currentSymbol === coin) {
                changePair(defaultCoins[0]);
            } else {
                renderCoinList();
            }
            showToast("Удалено", `${coin.replace('USDT','')} извлечен`, 'info');
            if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning');
        }

        function toggleSmartAlerts() {
            alertsEnabled = !alertsEnabled;
            localStorage.setItem('amigo_alerts_enabled', alertsEnabled ? 'true' : 'false');
            
            const btn = document.getElementById('btn-alerts');
            btn.classList.toggle('active', alertsEnabled);
            
            if (alertsEnabled) {
                showToast("Smart Alerts", "Мониторинг ≥10% запущен", "info");
                if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            } else {
                showToast("Smart Alerts", "Мониторинг деактивирован", "info");
            }
        }

        function checkAndFireAlert(symbol, price, changePct) {
            if (Math.abs(changePct) < 10.0) return;

            const alertKey = `alerted_${symbol}`;
            const lastAlertTime = sessionStorage.getItem(alertKey);
            const now = Date.now();

            if (!lastAlertTime || (now - parseInt(lastAlertTime) > 15 * 60 * 1000)) {
                const dir = changePct > 0 ? "🚀 ПАМП" : "🩸 ДАМП";
                const type = changePct > 0 ? "alert-up" : "alert-down";
                
                showToast(`${dir}: ${symbol.replace('USDT','')}`, `${price} (${changePct > 0 ? '+' : ''}${changePct}%)`, type);
                
                if (tg?.HapticFeedback) {
                    tg.HapticFeedback.notificationOccurred('warning');
                }
                
                sessionStorage.setItem(alertKey, now.toString());
            }
        }

        function showToast(title, message, type = '') {
            const container = document.getElementById('toast-container');
            if (!container) return;

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<div class="toast-title"><span>${title}</span></div><span>${message}</span>`;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.25s ease-out forwards';
                setTimeout(() => toast.remove(), 250);
            }, 3500);
        }

        renderCoinList();
        changePair(currentSymbol);
    </script>
</body>
</html>
